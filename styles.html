<style>
  :root{
    --bg:#07111f;
    --panel:#0c1727;
    --panel-2:#101c2f;
    --line:#1e2d44;
    --text:#e8eefc;
    --muted:#8ea0bf;
    --accent:#d12b2b;
    --accent-2:#f0b33a;
    --success:#2ecc71;
    --warning:#f5c542;
    --danger:#ff5d5d;
    --shadow:0 12px 30px rgba(0,0,0,.35);
    --radius:18px;
  }

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at top left, rgba(209,43,43,.10), transparent 25%),
      radial-gradient(circle at top right, rgba(240,179,58,.08), transparent 25%),
      linear-gradient(180deg, #06101d 0%, #081427 100%);
    color:var(--text);
    min-height:100vh;
  }

  #app{
    max-width:1600px;
    margin:0 auto;
    padding:24px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    margin-bottom:20px;
    padding:18px 20px;
    background:rgba(12,23,39,.88);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }

  .brand h1{
    margin:0;
    font-size:28px;
    letter-spacing:.4px;
  }

  .brand p{
    margin:6px 0 0;
    color:var(--muted);
    font-size:14px;
  }

  .actions{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    background:rgba(16,28,47,.9);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--muted);
    font-size:13px;
  }

  .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--success);
    box-shadow:0 0 10px rgba(46,204,113,.75);
  }

  .btn{
    border:0;
    cursor:pointer;
    padding:11px 16px;
    border-radius:12px;
    background:linear-gradient(135deg, var(--accent), #8d1d1d);
    color:white;
    font-weight:700;
    display:inline-flex;
    align-items:center;
    gap:10px;
    box-shadow:var(--shadow);
  }

  .grid{
    display:grid;
    grid-template-columns: 1.65fr 1fr;
    gap:20px;
    margin-bottom:20px;
  }

  .panel{
    background:rgba(12,23,39,.88);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .panel-head{
    padding:16px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--line);
    background:rgba(16,28,47,.65);
  }

  .panel-head h2{
    margin:0;
    font-size:16px;
    letter-spacing:.2px;
  }

  .panel-head span{
    color:var(--muted);
    font-size:13px;
  }

  .table-wrap{
    overflow:auto;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:820px;
  }

  th, td{
    padding:14px 16px;
    border-bottom:1px solid rgba(30,45,68,.7);
    text-align:left;
    font-size:14px;
    white-space:nowrap;
  }

  th{
    color:#b9c7e2;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    background:rgba(8,20,39,.35);
  }

  tbody tr:hover{
    background:rgba(255,255,255,.03);
  }

  .player-cell{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
  }

  .avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(135deg, #1f3558, #09111d);
    border:1px solid #263a59;
  }

  .rank-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  .rank-badge img{
    width:24px;
    height:24px;
    object-fit:contain;
  }

  .live{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }

  .live.on{ background:rgba(46,204,113,.15); color:#9ff0bd; }
  .live.wait{ background:rgba(245,197,66,.15); color:#ffe39a; }
  .live.off{ background:rgba(255,255,255,.08); color:#c9d3e6; }

  .chart-box{
    padding:16px;
    height:100%;
    min-height:420px;
  }

  .chart-inner{
    height:360px;
  }

  .bottom-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:14px;
    padding:16px;
  }

  .card{
    background:linear-gradient(180deg, rgba(16,28,47,.95), rgba(10,18,31,.95));
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
  }

  .card-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }

  .card-name{
    font-weight:800;
    margin:0 0 4px;
  }

  .card-tag{
    margin:0;
    color:var(--muted);
    font-size:13px;
  }

  .lp{
    font-size:30px;
    font-weight:900;
    color:var(--accent-2);
  }

  .meta{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    color:var(--muted);
    font-size:13px;
  }

  .chip{
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
  }

  .history{
    padding:16px;
  }

  .history-item{
    display:flex;
    justify-content:space-between;
    gap:12px;
    padding:12px 0;
    border-bottom:1px solid rgba(30,45,68,.7);
    color:#dbe5f7;
    font-size:14px;
  }

  .history-item:last-child{
    border-bottom:0;
  }

  .history-item span{
    color:var(--muted);
  }

  .empty{
    padding:22px;
    text-align:center;
    color:var(--muted);
  }

  @media (max-width: 1100px){
    .grid, .bottom-grid{
      grid-template-columns:1fr;
    }
  }

  @media (max-width: 720px){
    .topbar{
      flex-direction:column;
      align-items:flex-start;
    }

    .actions{
      width:100%;
      justify-content:flex-start;
    }

    .brand h1{
      font-size:22px;
    }
  }
</style>
