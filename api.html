<script>
/**
 * api.html — Configuración de la API de Riot Games y Data Dragon
 *
 * La API Key se carga desde secret.html (archivo privado, no está en GitHub).
 * RIOT_API_KEY ya está disponible como variable global.
 */
const REGION_ROUTING   = 'americas'; // Consultas de cuenta (PUUID)
const PLATFORM_ROUTING = 'la1';      // Consultas de liga/stats (LAN)

/* ─── Data Dragon (Assets estáticos de Riot) ─── */
const DDRAGON_VERSION  = '15.8.1';
const DDRAGON_BASE     = `https://ddragon.leagueoflegends.com/cdn`;

/**
 * Devuelve la URL del splash art de un campeón.
 * @param {string} championName — Nombre del campeón (ej: "Graves", "Yasuo").
 * @returns {string} — URL de la imagen splash.
 */
function getChampionSplashUrl(championName) {
  if (!championName) return '';
  const normalized = championName
    .trim()
    .replace(/\s+/g, '')   // "Lee Sin"    → "LeeSin"
    .replace(/'/g, '')     // "Kha'Zix"    → "KhaZix"
    .replace(/\./g, '');   // "Dr. Mundo"  → "DrMundo"
  return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${normalized}_0.jpg`;
}

/**
 * Devuelve la URL del loading art (vertical) de un campeón.
 * @param {string} championName — Nombre del campeón.
 * @returns {string} — URL de la imagen loading.
 */
function getChampionLoadingUrl(championName) {
  if (!championName) return '';
  const normalized = championName
    .trim()
    .replace(/\s+/g, '')
    .replace(/'/g, '')
    .replace(/\./g, '');
  return `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${normalized}_0.jpg`;
}

/**
 * Devuelve la URL del ícono cuadrado de un campeón.
 * @param {string} championName — Nombre del campeón.
 * @returns {string} — URL del ícono.
 */
function getChampionIconUrl(championName) {
  if (!championName) return '';
  const normalized = championName
    .trim()
    .replace(/\s+/g, '')
    .replace(/'/g, '')
    .replace(/\./g, '');
  return `${DDRAGON_BASE}/${DDRAGON_VERSION}/img/champion/${normalized}.png`;
}
</script>
