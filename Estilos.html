<style>
  :root{
    --bg:#0b0f14;
    --panel:#111820;
    --panel2:#16202b;
    --text:#e7edf4;
    --muted:#8a97a6;
    --accent:#d13639;
    --line:#243140;
    --shadow:0 12px 30px rgba(0,0,0,.35);
    --good:#4ade80;
    --info:#60a5fa;
    --warn:#f59e0b;
    --purple:#a855f7;
    --emerald:#19c37d;
    --gold:#f5c542;
    --diamond:#4aa3ff;
    --master:#a855f7;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    padding:24px;
    background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
    color:var(--text);
    font-family:"Segoe UI", Inter, Arial, sans-serif;
  }

  .container{
    max-width:1400px;
    margin:0 auto;
  }

  .title{
    margin:0 0 18px;
    font-size:48px;
    font-weight:900;
    letter-spacing:1px;
    font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;
    text-align:center;
    color:#f4f7fb;
    text-shadow:0 8px 24px rgba(0,0,0,.35);
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }

  button{
    padding:10px 14px;
    border:0;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
    font-weight:700;
    transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
  }

  button:hover{
    filter:brightness(1.05);
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(209,54,57,.25);
  }

  .layout{
    display:grid;
    grid-template-columns:minmax(0, 1.35fr) minmax(340px, .95fr);
    gap:18px;
    align-items:start;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:18px;
  }

  .sidebar{
    position:sticky;
    top:18px;
    background:linear-gradient(180deg, rgba(17,24,32,.92), rgba(22,32,43,.96));
    border:1px solid var(--line);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:16px;
    min-height:420px;
  }

  .sidebar h2{
    margin:0 0 12px;
    font-size:18px;
    letter-spacing:.3px;
  }

  .chart-wrap{
    position:relative;
    height:360px;
    width:100%;
  }

  .chart-empty{
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
    padding:10px 0 0;
  }

  .card{
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(17,24,32,.78) 0%, rgba(22,32,43,.92) 100%);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:18px;
    min-height:280px;
    display:flex;
    flex-direction:column;
    gap:14px;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    animation: fadeUp .35s ease both;
    cursor:pointer;
    background-size:cover;
    background-position:center;
  }

  .card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(11,15,20,.42) 0%, rgba(11,15,20,.88) 100%);
    z-index:0;
  }

  .card > *{
    position:relative;
    z-index:1;
  }

  .card:hover{
    transform: translateY(-6px);
    border-color: rgba(209,54,57,.55);
    box-shadow: 0 16px 40px rgba(0,0,0,.45);
  }

  .profile-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:2px;
    width:100%;
  }

  .level-badge{
    font-size:12px;
    font-weight:900;
    letter-spacing:.04em;
    color:#fff;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.12);
    text-align:center;
    min-width:44px;
  }

  .profile-icon{
    width:72px;
    height:72px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.18);
    object-fit:cover;
    object-position:center;
    background:#111820;
    box-shadow:0 10px 22px rgba(0,0,0,.35);
    display:block;
  }

  .card-head{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    margin-top:2px;
  }

  .name{
    font-size:24px;
    font-weight:900;
    line-height:1.05;
    text-align:center;
    word-break:break-word;
  }

  .tag{ display:none; }

  .rank{
    font-size:15px;
    font-weight:700;
    color:#f0f4f8;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    text-align:center;
    margin-top:auto;
  }

  .center-text{ text-align:center; }

  .emerald{ color:var(--emerald); }
  .gold{ color:var(--gold); }
  .diamond{ color:var(--diamond); }
  .master{ color:var(--master); }

  .footer{
    margin-top:18px;
    color:var(--muted);
    font-size:13px;
  }

  .status{
    margin-top:12px;
    color:var(--muted);
  }

  .empty{
    grid-column:1/-1;
    padding:20px;
    border:1px dashed var(--line);
    border-radius:16px;
    color:var(--muted);
    background:rgba(255,255,255,.02);
    text-align:center;
  }

  .bottom-list{
    margin-top:22px;
    background:linear-gradient(180deg, rgba(17,24,32,.92), rgba(22,32,43,.96));
    border:1px solid var(--line);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:16px;
  }

  .bottom-list h2{
    margin:0 0 12px;
    font-size:18px;
  }

  .record-list{
    display:grid;
    gap:10px;
  }

  .record-item{
    display:grid;
    grid-template-columns:1.4fr .8fr .8fr .8fr;
    gap:10px;
    align-items:center;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    font-size:14px;
  }

  .record-item span{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(3, 8, 12, .84);
    backdrop-filter: blur(10px);
    z-index:9999;
    padding:24px;
  }

  .modal.open{
    display:flex;
    animation: modalFade .18s ease-out;
  }

  .modal-card{
    width:min(1040px, 100%);
    border-radius:28px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(17,24,32,.98), rgba(22,32,43,.98));
    box-shadow:0 32px 90px rgba(0,0,0,.6);
    color:var(--text);
    position:relative;
    transform-origin:center;
    animation: modalPop .22s ease-out;
  }

  .modal-banner{
    min-height:250px;
    padding:26px;
    display:flex;
    align-items:flex-end;
    background:linear-gradient(90deg, rgba(11,15,20,.88) 0%, rgba(11,15,20,.52) 45%, rgba(11,15,20,.12) 100%), center/cover no-repeat;
    border-bottom:1px solid rgba(255,255,255,.06);
    position:relative;
  }

  .modal-banner::after{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 70% 20%, rgba(255,255,255,.08), transparent 32%);
    pointer-events:none;
  }

  .modal-content{
    padding:26px;
  }

  .modal-close{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    border:0;
    border-radius:50%;
    background:rgba(255,255,255,.10);
    color:#fff;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
    z-index:2;
  }

  .modal-actions{
    position:absolute;
    top:18px;
    right:68px;
    display:flex;
    gap:8px;
    z-index:3;
  }

  .modal-actions a{
    width:30px;
    height:30px;
    border-radius:50%;
    display:grid;
    place-items:center;
    text-decoration:none;
    font-size:11px;
    font-weight:900;
    color:#fff;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.12);
    transition:.2s ease;
  }

  .modal-actions a:hover{
    transform:translateY(-2px);
    background:rgba(209,54,57,.35);
  }

  .modal-details{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:14px;
    margin-top:16px;
  }

  .modal-item{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    border-radius:16px;
    padding:14px;
  }

  .modal-item .label{
    color:var(--muted);
    font-size:12px;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .modal-item .value{
    font-size:18px;
    font-weight:800;
    word-break:break-word;
  }

  .value.good{ color:var(--good); }
  .value.info{ color:var(--info); }
  .value.warn{ color:var(--warn); }
  .value.purple{ color:var(--purple); }

  .champ-card{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    border-radius:18px;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.10);
    width:fit-content;
    box-shadow:0 14px 28px rgba(0,0,0,.22);
    backdrop-filter: blur(10px);
  }

  .champ-card img{
    width:60px;
    height:60px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid rgba(255,255,255,.12);
    background:#111820;
  }

  .champ-card .champ-name{
    font-size:17px;
    font-weight:900;
    color:#fff;
    line-height:1.1;
  }

  .champ-card .champ-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
  }

  .tips{
    margin-top:18px;
    padding:14px 16px;
    border-radius:18px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    color:#dbe7f5;
    line-height:1.5;
  }

  .tips strong{ color:#fff; }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(12px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @keyframes modalFade{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  @keyframes modalPop{
    from{ opacity:0; transform: translateY(16px) scale(.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 980px){
    .layout{
      grid-template-columns:1fr;
    }
    .sidebar{
      position:relative;
      top:auto;
    }
    .record-item{
      grid-template-columns:1fr 1fr;
    }
  }

  @media (max-width: 640px){
    body{ padding:14px; }
    .cards{ grid-template-columns:1fr; gap:14px; }
    .card{ padding:16px; min-height:250px; }
    .title{ font-size:36px; }
    .profile-icon{ width:66px; height:66px; }
    .modal{ padding:12px; }
    .modal-banner{ min-height:190px; padding:18px; }
    .modal-content{ padding:18px; }
    .modal-details{ grid-template-columns:1fr; }
    .champ-card{ width:100%; }
    .tips{ font-size:14px; }
    .record-item{ grid-template-columns:1fr; }
  }
</style>
