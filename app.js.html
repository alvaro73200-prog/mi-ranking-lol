<script>
  let chart = null;
  let currentPlayers = [];

  function formatTime(iso){
    const d = new Date(iso);
    return d.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
  }

  function rankText(p){
    return `${p.tier || 'UNRANKED'} ${p.rank || ''}`.trim();
  }

  function liveLabel(state){
    if(state === 'on') return '<span class="live on"><i class="fa-solid fa-circle"></i> Live</span>';
    if(state === 'wait') return '<span class="live wait"><i class="fa-solid fa-circle"></i> En cola</span>';
    return '<span class="live off"><i class="fa-solid fa-circle"></i> Offline</span>';
  }

  function renderTable(players){
    const tbody = document.getElementById('playersTable');
    if(!players.length){
      tbody.innerHTML = '<tr><td colspan="7" class="empty">Sin jugadores cargados.</td></tr>';
      return;
    }

    tbody.innerHTML = players.map(p => `
      <tr>
        <td>
          <div class="player-cell">
            <div class="avatar"></div>
            <div>
              <div>${p.riotId}</div>
              <small style="color:var(--muted)">${p.champion || '—'}</small>
            </div>
          </div>
        </td>
        <td><strong>${p.lp ?? 0}</strong></td>
        <td>${rankText(p)}</td>
        <td>${p.champion || '—'}</td>
        <td>${liveLabel(p.live)}</td>
        <td>${p.wr ?? 0}%</td>
        <td>${p.wins ?? 0}/${p.losses ?? 0}</td>
      </tr>
    `).join('');
  }

  function renderCards(players){
    const area = document.getElementById('cardsArea');
    if(!players.length){
      area.innerHTML = '<div class="empty">Sin tarjetas para mostrar.</div>';
      return;
    }

    area.innerHTML = players.map(p => `
      <div class="card" data-riotid="${p.riotId}">
        <div class="card-bg"></div>
        <div class="card-overlay"></div>
        <div class="card-content">
          <div class="card-top">
            <div>
              <p class="card-name">${p.riotId}</p>
              <p class="card-tag">${rankText(p)}</p>
            </div>
            <div class="lp">${p.lp ?? 0}</div>
          </div>
          <div class="meta">
            <span class="chip">WR ${p.wr ?? 0}%</span>
            <span class="chip">V ${p.wins ?? 0}</span>
            <span class="chip">D ${p.losses ?? 0}</span>
          </div>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const riotId = card.dataset.riotid;
        const player = currentPlayers.find(p => p.riotId === riotId);
        if (player) openModal(player);
      });
    });
  }

  function renderChart(players){
    const canvas = document.getElementById('lpChart');
    if(!canvas) return;

    const ctx = canvas.getContext('2d');
    const labels = players.map(p => p.riotId);
    const data = players.map(p => p.lp ?? 0);

    if(chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'LP',
          data,
          backgroundColor: 'rgba(209,43,43,.75)',
          borderColor: 'rgba(240,179,58,1)',
          borderWidth: 1,
          borderRadius: 10
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e8eefc' } } },
        scales: {
          x: { ticks: { color: '#b9c7e2' }, grid: { color: 'rgba(255,255,255,.05)' } },
          y: { beginAtZero: true, ticks: { color: '#b9c7e2' }, grid: { color: 'rgba(255,255,255,.06)' } }
        }
      }
    });
  }

  function renderAll(data){
    currentPlayers = data.players || [];
    document.getElementById('lastUpdate').textContent = formatTime(data.timestamp || new Date().toISOString());
    renderTable(currentPlayers);
    renderCards(currentPlayers);
    renderChart(currentPlayers);
  }

  function loadData(){
    google.script.run
      .withSuccessHandler(renderAll)
      .withFailureHandler(err => {
        console.error(err);
        document.getElementById('playersTable').innerHTML = '<tr><td colspan="7" class="empty">Error cargando datos.</td></tr>';
        document.getElementById('cardsArea').innerHTML = '<div class="empty">No se pudieron cargar las tarjetas.</div>';
      })
      .getOracleData();
  }

  function openModal(player){
    document.getElementById('modalTitle').textContent = player.riotId;
    document.getElementById('modalSubtitle').textContent = `${rankText(player)} · ${player.lp ?? 0} LP`;

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-grid">
        <div class="modal-section">
          <h4>Resumen</h4>
          <div class="history-row"><span>Tier</span><strong>${player.tier || 'UNRANKED'}</strong></div>
          <div class="history-row"><span>Rango</span><strong>${player.rank || '-'}</strong></div>
          <div class="history-row"><span>LP</span><strong>${player.lp ?? 0}</strong></div>
          <div class="history-row"><span>Victorias</span><strong>${player.wins ?? 0}</strong></div>
          <div class="history-row"><span>Derrotas</span><strong>${player.losses ?? 0}</strong></div>
          <div class="history-row"><span>WR</span><strong>${player.wr ?? 0}%</strong></div>
        </div>
        <div class="modal-section">
          <h4>Estado</h4>
          <div class="history-row"><span>Live</span><strong>${player.live || 'off'}</strong></div>
          <div class="history-row"><span>PUUID</span><strong>${player.puuid ? 'OK' : '—'}</strong></div>
          <div class="history-row"><span>SummonerId</span><strong>${player.summonerId ? 'OK' : '—'}</strong></div>
        </div>
      </div>
    `;

    document.getElementById('playerModal').classList.add('show');
  }

  function closeModal(){
    document.getElementById('playerModal').classList.remove('show');
  }

  document.getElementById('refreshBtn').addEventListener('click', loadData);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('playerModal').addEventListener('click', (e) => {
    if (e.target.id === 'playerModal') closeModal();
  });

  loadData();
</script>
