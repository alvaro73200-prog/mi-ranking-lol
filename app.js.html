<script>
  const demoData = {
    timestamp: new Date().toISOString(),
    players: [
      { riotId: 'Grey#W8TM', lp: 75, tier: 'GOLD', rank: 'II', champion: 'Yasuo', live: 'off', wr: 57, wins: 34, losses: 26 },
      { riotId: 'Player2#LAN', lp: 42, tier: 'SILVER', rank: 'I', champion: 'Jinx', live: 'on', wr: 61, wins: 31, losses: 20 },
      { riotId: 'Player3#LAN', lp: 110, tier: 'PLATINUM', rank: 'IV', champion: 'Ahri', live: 'wait', wr: 54, wins: 40, losses: 34 }
    ]
  };

  let chart = null;

  function formatTime(iso){
    const d = new Date(iso);
    return d.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
  }

  function rankText(p){
    return `${p.tier || 'UNRANKED'} ${p.rank || ''}`.trim();
  }

  function liveLabel(state){
    if(state === 'on') return '<span class="live on"><i class="fa-solid fa-circle"></i> Live</span>';
    if(state === 'wait') return '<span class="live wait"><i class="fa-solid fa-circle"></i> En cola</span>';
    return '<span class="live off"><i class="fa-solid fa-circle"></i> Offline</span>';
  }

  function renderTable(players){
    const tbody = document.getElementById('playersTable');

    if(!players.length){
      tbody.innerHTML = '<tr><td colspan="7" class="empty">Sin jugadores cargados.</td></tr>';
      return;
    }

    tbody.innerHTML = players.map(p => `
      <tr>
        <td>
          <div class="player-cell">
            <div class="avatar"></div>
            <div>
              <div>${p.riotId}</div>
              <small style="color:var(--muted)">${p.champion || '—'}</small>
            </div>
          </div>
        </td>
        <td><strong>${p.lp ?? 0}</strong></td>
        <td>
          <span class="rank-badge">
            <img src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/positions/${(p.tier || 'unranked').toLowerCase()}.png" onerror="this.style.display='none'">
            ${rankText(p)}
          </span>
        </td>
        <td>${p.champion || '—'}</td>
        <td>${liveLabel(p.live)}</td>
        <td>${p.wr ?? 0}%</td>
        <td>${p.wins ?? 0}/${p.losses ?? 0}</td>
      </tr>
    `).join('');
  }

  function renderCards(players){
    const area = document.getElementById('cardsArea');

    if(!players.length){
      area.innerHTML = '<div class="empty">Sin tarjetas para mostrar.</div>';
      return;
    }

    area.innerHTML = players.map(p => `
      <div class="card">
        <div class="card-top">
          <div>
            <p class="card-name">${p.riotId}</p>
            <p class="card-tag">${rankText(p)}</p>
          </div>
          <div class="lp">${p.lp ?? 0}</div>
        </div>
        <div class="meta">
          <span class="chip">WR ${p.wr ?? 0}%</span>
          <span class="chip">V ${p.wins ?? 0}</span>
          <span class="chip">D ${p.losses ?? 0}</span>
          <span class="chip">${p.champion || 'Sin campeón'}</span>
        </div>
      </div>
    `).join('');
  }

  function renderHistory(players){
    const area = document.getElementById('historyArea');

    if(!players.length){
      area.innerHTML = '<div class="empty">Sin eventos aún.</div>';
      return;
    }

    area.innerHTML = players.map(p => `
      <div class="history-item">
        <div>${p.riotId} <span>actualizó su estado</span></div>
        <div>${rankText(p)} · ${p.lp ?? 0} LP</div>
      </div>
    `).join('');
  }

  function renderChart(players){
    const canvas = document.getElementById('lpChart');
    if(!canvas) return;

    const ctx = canvas.getContext('2d');
    const labels = players.map(p => p.riotId);
    const data = players.map(p => p.lp ?? 0);

    if(chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'LP',
          data,
          backgroundColor: 'rgba(209,43,43,.75)',
          borderColor: 'rgba(240,179,58,1)',
          borderWidth: 1,
          borderRadius: 10
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#e8eefc' } }
        },
        scales: {
          x: {
            ticks: { color: '#b9c7e2' },
            grid: { color: 'rgba(255,255,255,.05)' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#b9c7e2' },
            grid: { color: 'rgba(255,255,255,.06)' }
          }
        }
      }
    });
  }

  function renderAll(data){
    const players = data.players || [];
    document.getElementById('lastUpdate').textContent = formatTime(data.timestamp || new Date().toISOString());
    renderTable(players);
    renderCards(players);
    renderHistory(players);
    renderChart(players);
  }

  function loadData(){
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(renderAll)
        .withFailureHandler(err => {
          console.error(err);
          renderAll(demoData);
        })
        .getOracleData();
    } else {
      renderAll(demoData);
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadData);

  loadData();
</script>
