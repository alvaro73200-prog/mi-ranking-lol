<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard LAN - Team Grey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #060608;
            --card: #121217;
            --accent: #00cfbc;
            --gold: #f0e6d2;
            --master: #ff79c6;
            --diamante: #3498db;
            --esmeralda: #2ecc71;
            --oro: #f1c40f;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
        }

        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 22px; }

        .leaderboard-card {
            background: var(--card);
            border: 1px solid #25262d;
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            overflow-x: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; color: #a0a0a8; font-size: 10px; text-transform: uppercase; padding: 20px 15px; border-bottom: 1px solid #25262d; }
        td { padding: 18px 15px; border-bottom: 1px solid #1e1f24; font-size: 14px; }

        .rank-tag {
            padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        .rank-master { color: var(--master); border-color: var(--master); box-shadow: 0 0 10px rgba(255,121,198,0.2); }
        .rank-diamante { color: var(--diamante); border-color: var(--diamante); }
        .rank-esmeralda { color: var(--esmeralda); border-color: var(--esmeralda); }
        .rank-oro { color: var(--oro); border-color: var(--oro); }

        .lp-text { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 16px; }
        .winrate { font-size: 12px; color: #888; }
        .kda-box { font-weight: bold; color: #eee; }
        .live-status { font-size: 12px; font-weight: bold; color: #ff4e50; animation: pulse 2s infinite; }
        
        @keyframes pulse { 
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        .fire-streak { filter: drop-shadow(0 0 5px orange); }
    </style>
</head>
<body>

    <h1>LEADERBOARD LAN</h1>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invocador</th>
                    <th>Rango / LP</th>
                    <th>W/L (WR%)</th>
                    <th>KDA (5 Last)</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr><td colspan="6" style="text-align:center; padding:50px; color:#555;">Sincronizando con la API de Riot...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const sorted = results.data.sort((a,b) => parseInt(b.LP || 0) - parseInt(a.LP || 0));
                    render(sorted);
                }
            });
        }

        function render(players) {
            const container = document.getElementById('table-content');
            let html = '';

            players.forEach((p, i) => {
                const r = (p.Rango || "").toLowerCase();
                let rClass = r.includes('master') ? 'rank-master' : r.includes('diamante') ? 'rank-diamante' : r.includes('esmeralda') ? 'rank-esmeralda' : r.includes('oro') ? 'rank-oro' : '';
                
                const isLive = p["Estado Live"] && p["Estado Live"].includes("partida");
                const hasFire = p["Racha"] && p["Racha"].includes("🔥");

                html += `
                    <tr>
                        <td style="color:#444; font-weight:bold;">${i + 1}</td>
                        <td>
                            <div style="font-weight:bold; font-size:15px;">${p.Jugador} ${hasFire ? '<span class="fire-streak">🔥</span>' : ''}</div>
                        </td>
                        <td>
                            <span class="rank-tag ${rClass}">${p.Rango || '---'}</span>
                            <div class="lp-text">${p.LP || 0} LP</div>
                        </td>
                        <td>
                            <div style="color:#ccc">${p["V/D"] || '0W / 0D'}</div>
                            <div class="winrate">${p["WR%"] || '0%'} Winrate</div>
                        </td>
                        <td class="kda-box">${p["KDA Avg"] || '0.00'}</td>
                        <td>
                            ${isLive ? '<span class="live-status">🔴 EN PARTIDA</span>' : '<span style="color:#444">Offline</span>'}
                        </td>
                    </tr>
                `;
            });
            container.innerHTML = html;
        }
        window.onload = loadData;
    </script>
</body>
</html>
