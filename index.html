<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE MONITOREO LAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #16161c;
            --accent: #00cfbc;
            --gold: #f0e6d2;
            --text-main: #ffffff;
            --text-dim: #a0a0a8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { 
            color: var(--gold); 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            font-size: 28px;
        }

        .refresh-timer { font-size: 12px; color: #555; margin-bottom: 30px; }

        .chart-container {
            background: var(--card);
            border-radius: 12px;
            width: 100%;
            max-width: 1000px;
            padding: 25px;
            margin-bottom: 25px;
            height: 320px;
            border: 1px solid #25262d;
        }

        .leaderboard-card {
            background: var(--card);
            border-radius: 12px;
            width: 100%;
            max-width: 1000px;
            overflow: hidden;
            border: 1px solid #25262d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            color: var(--text-dim); 
            font-size: 12px; 
            text-transform: uppercase; 
            padding: 20px; 
            border-bottom: 1px solid #25262d;
            letter-spacing: 1px;
        }
        td { padding: 20px; border-bottom: 1px solid #1e1f24; }

        /* Columna Invocador */
        .player-info { display: flex; flex-direction: column; }
        .player-name { font-weight: bold; font-size: 16px; color: var(--text-main); text-decoration: none; margin-bottom: 6px; }
        .sugerencia-box {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sugerencia-box i { color: var(--gold); font-size: 10px; }

        /* Columna Rango con Icono */
        .rank-cell { display: flex; align-items: center; gap: 12px; }
        .rank-icon { width: 40px; height: 40px; object-fit: contain; }
        .rank-name { font-weight: 600; font-size: 14px; color: #eee; text-transform: uppercase; }

        .lp-text { color: var(--accent); font-weight: bold; font-size: 15px; }
        
        /* Estado */
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .pulse { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; }
        .lvl-text { font-size: 10px; color: #666; display: block; margin-top: 2px; }

    </style>
</head>
<body>

    <h1>SISTEMA DE MONITOREO LAN</h1>
    <div id="timer" class="refresh-timer">Sincronizando...</div>

    <div class="chart-container">
        <canvas id="lpChart"></canvas>
    </div>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>Invocador</th>
                    <th>Rango</th>
                    <th>Puntos (LP)</th>
                    <th>WR%</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="table-content"></tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';
        
        const sugerencias = {
            'Grey#W8TM': '¡Sigue con Hwei! Controla mejor la wave en el nivel 6.',
            'Azzz#Bou': 'Buen KDA. Prueba rotar más a bot después de la primera torre.',
            'Raven#Aisha': 'Focus en el farm. Intenta llegar a 8 CS/min.',
            'Bodkin Arrow#bhr': 'La racha está 🔥. Sigue con el mismo pool de campeones.',
            'Zenix#4025': 'Cuidado con los gankeos nivel 3. Wardea más profundo.'
        };

        function getRankIcon(rankStr) {
            const tier = rankStr.split(' ')[0].toLowerCase();
            // Si no tiene rango o el Excel dice "SIN RANGO", usamos el icono de Unranked
            const validTiers = ['iron', 'bronze', 'silver', 'gold', 'platinum', 'emerald', 'diamond', 'master', 'grandmaster', 'challenger'];
            const finalTier = validTiers.includes(tier) ? tier : 'unranked';
            return `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-${finalTier}.png`;
        }

        function loadData() {
            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const sorted = results.data.sort((a,b) => parseInt(b.LP || 0) - parseInt(a.LP || 0));
                    renderTable(sorted);
                    renderChart(sorted);
                    document.getElementById('timer').innerText = "ÚLTIMA ACTUALIZACIÓN: " + new Date().toLocaleTimeString();
                }
            });
        }

        function renderTable(players) {
            const tbody = document.getElementById('table-content');
            tbody.innerHTML = players.map((p, i) => {
                const id = p.Jugador.trim();
                const rankIcon = getRankIcon(p.Rango || "SIN RANGO");
                const isOnline = p["Campeón"] === "Online";

                return `
                    <tr>
                        <td>${i + 1}</td>
                        <td>
                            <div class="player-info">
                                <span class="player-name">${id}</span>
                                <div class="sugerencia-box">
                                    <i class="fas fa-lightbulb"></i> ${sugerencias[id] || 'Sigue jugando para recibir consejos.'}
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="rank-cell">
                                <img src="${rankIcon}" class="rank-icon">
                                <span class="rank-name">${p.Rango || "SIN RANGO"}</span>
                            </div>
                        </td>
                        <td class="lp-text">${p.LP || 0} LP</td>
                        <td>
                            <div style="font-weight:bold">${p["WR%"] || '0%'}</div>
                            <div style="font-size:10px; color:#555">${p["V/D"] || '0W/0D'}</div>
                        </td>
                        <td>
                            <div class="status-badge">
                                ${isOnline ? '<span class="pulse"></span> Online' : '<span style="color:#444">Offline</span>'}
                            </div>
                            <span class="lvl-text">LVL ${p["Estado Live"]?.replace('Nivel: ','') || '--'}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderChart(players) {
            const ctx = document.getElementById('lpChart').getContext('2d');
            const data = {
                labels: players.map(p => p.Jugador.split('#')[0]),
                datasets: [{
                    label: 'LP',
                    data: players.map(p => parseInt(p.LP || 0)),
                    backgroundColor: '#00cfbc',
                    borderRadius: 4
                }]
            };
            if(window.chartInstance) window.chartInstance.destroy();
            window.chartInstance = new Chart(ctx, {
                type: 'bar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#25262d' }, ticks: { color: '#666' } },
                        x: { grid: { display: false }, ticks: { color: '#aaa' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = loadData;
        setInterval(loadData, 300000); // Refrescar cada 5 min
    </script>
</body>
</html>
