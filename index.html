<!DOCTYPE html>
<html lang="es">
<head><title>LOL Tracker LAN</title></head>
<body style="font-family:Arial;">
  <h1>🛡️ LOL Tracker LAN (Click para test)</h1>
  <button onclick="loadData()">Cargar Jugadores</button>
  <pre id="output">Datos aparecerán aquí...</pre>
  <script src="data.js" defer></script>
  <script>
    async function loadData() {
      const data = await fetchData();
      document.getElementById('output').textContent = 
        data.map(p => `${p.jugador}#${p.tagline || '?'} | ${p.rango} ${p.lp} | WR ${p.wr} | ${p.vd}`).join('\n');
    }
  </script>
</body>
</html>
