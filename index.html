<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111822;
      --panel-2: #161f2b;
      --line: #243244;
      --text: #e7edf5;
      --muted: #9fb0c3;
      --accent: #d13639;
      --accent-2: #4cc9f0;
      --good: #40c057;
      --warn: #f59f00;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #090d12 0%, #0b0f14 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .3px;
      margin: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .refresh {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: .2s;
    }

    .refresh:hover {
      transform: translateY(-1px);
      border-color: #33485f;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, rgba(17,24,34,.96), rgba(13,18,26,.96));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(209,54,57,.4);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .player-name {
      font-size: 20px;
      font-weight: 800;
      margin: 0;
      line-height: 1.1;
    }

    .pentas-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      background: linear-gradient(135deg, #8f1dff, #d13639);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(209,54,57,.25);
      white-space: nowrap;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
    }

    .rank-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.06);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .rank-info {
      min-width: 0;
      flex: 1;
    }

    .rank {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
    }

    .last-champ {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 12px;
      min-height: 74px;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 7px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
    }

    .stat-value.good { color: var(--good); }
    .stat-value.warn { color: var(--warn); }
    .stat-value.accent { color: var(--accent-2); }

    .footer-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.05);
    }

    .chart-wrap {
      margin-top: 20px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .chart-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 16px, 100%); }
      .cards { grid-template-columns: 1fr; }
      .card { padding: 14px; }
      .rank-row { align-items: flex-start; }
      .rank-icon { width: 48px; height: 48px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">LOL Tracker LAN</h1>
        <p class="subtitle">Monitoreo de jugadores con estilo dashboard</p>
      </div>
      <button class="refresh" onclick="loadData()">
        <i class="fa-solid fa-rotate"></i> Actualizar
      </button>
    </div>

    <div id="cards" class="cards"></div>

    <div class="chart-wrap">
      <h2 class="chart-title">LP por jugador</h2>
      <canvas id="lpChart" height="110"></canvas>
    </div>
  </div>

  <script>
    const DATA_URL = 'URL_DE_TU_APPS_SCRIPT_AQUI';
    let lpChart;

    async function loadData() {
      const res = await fetch(`${DATA_URL}?_=${Date.now()}`);
      const data = await res.json();
      renderCards(data);
      renderChart(data);
    }

    function renderCards(players) {
      const cards = document.getElementById('cards');
      cards.innerHTML = players.map(p => {
        const pentas = Number(p.pentas || 0);
        const pentaBadge = pentas > 0 ? `<div class="pentas-badge"><i class="fa-solid fa-star"></i> ${pentas} Pentas</div>` : '';
        const lastChamp = p.ultimoCampeon || p.lastChampion || 'Sin datos';
        const rankText = p.rango || 'Sin Rango';
        const rankDetail = p.lp ? `${p.lp} LP` : '';
        const vision = p.vision ?? '0';
        const kp = p.kp ?? '0%';
        const dpm = p.dpm ?? '0';
        const kda = p.kda ?? '0.00';

        return `
          <article class="card">
            <div class="card-header">
              <div>
                <h3 class="player-name">${p.jugador || 'Jugador'} ${p.icono ? `<span style="opacity:.0">.</span>` : ''}</h3>
                <div class="meta">
                  <span class="chip"><i class="fa-solid fa-ranking-star"></i> ${rankText}</span>
                  <span class="chip"><i class="fa-solid fa-sack-dollar"></i> ${rankDetail}</span>
                </div>
              </div>
              ${pentas ? pentaBadge : ''}
            </div>

            <div class="rank-row">
              <img class="rank-icon" src="${getRankIcon(p.rango)}" alt="Rango">
              <div class="rank-info">
                <p class="rank">${rankText}</p>
                <div class="last-champ"><i class="fa-solid fa-dragon"></i> Último Campeón: <strong>${lastChamp}</strong></div>
              </div>
            </div>

            <div class="stats">
              <div class="stat">
                <span class="stat-label">Visión</span>
                <div class="stat-value accent">${vision}</div>
              </div>
              <div class="stat">
                <span class="stat-label">KP%</span>
                <div class="stat-value">${kp}</div>
              </div>
              <div class="stat">
                <span class="stat-label">DPM</span>
                <div class="stat-value warn">${dpm}</div>
              </div>
              <div class="stat">
                <span class="stat-label">KDA</span>
                <div class="stat-value good">${kda}</div>
              </div>
            </div>

            <div class="footer-row">
              <span class="chip"><i class="fa-solid fa-shield-halved"></i> ${p.lineaFavorita || '—'}</span>
              <span class="chip"><i class="fa-solid fa-arrow-right-arrow-left"></i> ${p.lineaSecundaria || '—'}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderChart(players) {
      const ctx = document.getElementById('lpChart');
      const labels = players.map(p => p.jugador);
      const values = players.map(p => Number(p.lp || 0));

      if (lpChart) lpChart.destroy();

      lpChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'LP',
            data: values,
            backgroundColor: '#d13639'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#e7edf5' } }
          },
          scales: {
            x: { ticks: { color: '#9fb0c3' }, grid: { color: 'rgba(255,255,255,.05)' } },
            y: { ticks: { color: '#9fb0c3' }, grid: { color: 'rgba(255,255,255,.05)' } }
          }
        }
      });
    }

    function getRankIcon(rank) {
      const r = (rank || '').toLowerCase();
      if (r.includes('iron')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/18.png';
      if (r.includes('bronze')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/62.png';
      if (r.includes('silver')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/25.png';
      if (r.includes('gold')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/81.png';
      if (r.includes('platinum')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/517.png';
      if (r.includes('emerald')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/157.png';
      if (r.includes('diamond')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/238.png';
      if (r.includes('master')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/134.png';
      if (r.includes('grandmaster')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/523.png';
      if (r.includes('challenger')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/777.png';
      return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-game-global/default/v1/champion-icons/0.png';
    }

    loadData();
  </script>
</body>
</html>
