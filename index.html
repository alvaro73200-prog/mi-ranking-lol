<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#eee;padding:24px}
    button{padding:10px 14px;border:0;border-radius:8px;background:#d33;color:#fff;cursor:pointer}
    pre{margin-top:16px;background:#1b1b1b;padding:16px;border-radius:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>LOL Tracker LAN</h1>
  <button onclick="loadData()">Cargar datos</button>
 <table style="width:100%;margin-top:16px;border-collapse:collapse;background:#1b1b1b;border-radius:10px;overflow:hidden">
  <thead>
    <tr>
      <th style="text-align:left;padding:12px;border-bottom:1px solid #333;">Jugador</th>
      <th style="text-align:left;padding:12px;border-bottom:1px solid #333;">Rango</th>
      <th style="text-align:left;padding:12px;border-bottom:1px solid #333;">LP</th>
      <th style="text-align:left;padding:12px;border-bottom:1px solid #333;">WR</th>
      <th style="text-align:left;padding:12px;border-bottom:1px solid #333;">V/D</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr>
      <td colspan="5" style="padding:12px;">Presiona el botón...</td>
    </tr>
  </tbody>
</table>

  <script src="./data.js"></script>
  <script>
    async function loadData() {
  const tbody = document.getElementById('tableBody');
  try {
    const data = await window.fetchData();
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="padding:12px;">No se encontraron datos.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(row => `
      <tr>
        <td style="padding:12px;border-bottom:1px solid #333;">${row.jugador}${row.tag ? '#' + row.tag : ''}</td>
        <td style="padding:12px;border-bottom:1px solid #333;">${row.rango}</td>
        <td style="padding:12px;border-bottom:1px solid #333;">${row.lp} LP</td>
        <td style="padding:12px;border-bottom:1px solid #333;">${row.wr}</td>
        <td style="padding:12px;border-bottom:1px solid #333;">${row.vd}</td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5" style="padding:12px;">Error: ${err.message}</td></tr>`;
  }
}
  </script>
</body>
</html>
