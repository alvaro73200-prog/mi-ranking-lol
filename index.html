<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Leaderboard - Team Grey</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f1214; color: white; font-family: 'Segoe UI', sans-serif; margin: 20px; }
        .container { max-width: 1000px; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .leaderboard { flex: 1; min-width: 300px; background: #1a1e22; padding: 20px; border-radius: 10px; }
        .chart-container { flex: 1; min-width: 300px; background: #1a1e22; padding: 20px; border-radius: 10px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #f0e6d2; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2e33; }
        th { color: #888; text-transform: uppercase; font-size: 12px; }
        .rank-master { color: #cc33ff; font-weight: bold; }
        .rank-diamond { color: #3399ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>RANKING LAN - GRUPO</h1>
    <div class="container">
        <div class="leaderboard">
            <h2>Clasificación</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jugador</th>
                        <th>Rango</th>
                        <th>LP</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr><td>1</td><td>Grey#W8TM</td><td>MASTER</td><td>150 LP</td></tr>
                    <tr><td>2</td><td>Azz#Bou</td><td>DIAMANTE I</td><td>85 LP</td></tr>
                    <tr><td>3</td><td>Bodkin Arrow#bhr</td><td>DIAMANTE II</td><td>20 LP</td></tr>
                </tbody>
            </table>
        </div>

        <div class="chart-container">
            <h2>Evolución de LP</h2>
            <canvas id="progresoChart"></canvas>
        </div>
    </div>

    <script>
        // Configuración de la Gráfica
        const ctx = document.getElementById('progresoChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['13 Mar', '19 Mar', '25 Mar', '1 Abr', '7 Abr', '13 Abr'], // Fechas
                datasets: [{
                    label: 'Grey',
                    data: [100, 120, 110, 140, 150, 160],
                    borderColor: '#00f2ff',
                    tension: 0.4
                }, {
                    label: 'Azz',
                    data: [80, 85, 90, 82, 88, 95],
                    borderColor: '#ff00ff',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: 'white' } },
                    x: { grid: { color: '#333' }, ticks: { color: 'white' } }
                }
            }
        });
    </script>
</body>
</html>
