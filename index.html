<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111820;
      --panel2:#16202b;
      --text:#e7edf4;
      --muted:#8a97a6;
      --accent:#d13639;
      --line:#243140;
      --shadow:0 12px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
      color:var(--text);
      font-family:"Segoe UI", Inter, Arial, sans-serif;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
      letter-spacing:.5px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
    }

    button:hover{filter:brightness(1.05)}

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
      min-height:220px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card-head{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .rank-icon{
      width:56px;
      height:56px;
      min-width:56px;
      min-height:56px;
      object-fit:contain;
      display:block;
    }

    .name{
      font-size:20px;
      font-weight:800;
      line-height:1.1;
    }

    .tag{
      color:var(--muted);
      margin-top:4px;
      font-size:13px;
    }

    .rank{
      font-size:15px;
      font-weight:700;
      color:#f0f4f8;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:auto;
    }

    .stat{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
      border-radius:12px;
      padding:10px;
    }

    .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .value{
      font-size:18px;
      font-weight:800;
    }

    .footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
    }

    .status{
      margin-top:12px;
      color:var(--muted);
    }

    .empty{
      grid-column:1/-1;
      padding:20px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LOL Tracker LAN</h1>
    <div class="sub">Vista por tarjetas para tu equipo, estilo oscuro tipo Riot.</div>

    <div class="topbar">
      <button onclick="loadData()">Cargar datos</button>
    </div>

    <div id="cards" class="cards">
      <div class="empty">Presiona “Cargar datos” para ver los jugadores.</div>
    </div>

    <div id="status" class="status"></div>
    <div class="footer">Datos cargados desde Google Sheets con tu CSV público.</div>
  </div>

  <script src="./data.js"></script>
  <script>
    function getRankIcon(rango) {
      const r = String(rango || '').toLowerCase();
      if (r.includes('iron')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-iron.png';
      if (r.includes('bronze')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-bronze.png';
      if (r.includes('silver')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-silver.png';
      if (r.includes('gold')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-gold.png';
      if (r.includes('platinum')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-platinum.png';
      if (r.includes('emerald')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-emerald.png';
      if (r.includes('diamond')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-diamond.png';
      if (r.includes('master')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-master.png';
      if (r.includes('grandmaster')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-grandmaster.png';
      if (r.includes('challenger')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-challenger.png';
      return '';
    }

    async function loadData() {
      const cards = document.getElementById('cards');
      const status = document.getElementById('status');

      try {
        status.textContent = 'Cargando...';
        const data = await window.fetchData();

        if (!data.length) {
          cards.innerHTML = '<div class="empty">No se encontraron datos.</div>';
          status.textContent = '';
          return;
        }

        cards.innerHTML = data.map(row => {
          const icon = getRankIcon(row.rango);
          return `
            <article class="card">
              <div class="card-head">
                ${icon ? `<img class="rank-icon" src="${icon}" alt="${row.rango}">` : ''}
                <div>
                  <div class="name">${row.jugador || ''}</div>
                  <div class="tag">${row.tag ? '#' + row.tag : ''}</div>
                </div>
              </div>

              <div class="rank">${row.rango || ''}</div>

              <div class="stats">
                <div class="stat">
                  <div class="label">LP</div>
                  <div class="value">${row.lp || ''}</div>
                </div>
                <div class="stat">
                  <div class="label">WR</div>
                  <div class="value">${row.wr || ''}</div>
                </div>
                <div class="stat" style="grid-column:1/-1;">
                  <div class="label">V/D</div>
                  <div class="value">${row.vd || ''}</div>
                </div>
              </div>
            </article>
          `;
        }).join('');

        status.textContent = `Actualizado: ${new Date().toLocaleString()}`;
      } catch (err) {
        cards.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
        status.textContent = '';
      }
      .card{
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  animation: fadeUp .35s ease both;
}

.card:hover{
  transform: translateY(-6px);
  border-color: rgba(209,54,57,.55);
  box-shadow: 0 16px 40px rgba(0,0,0,.45);
}

button{
  transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(209,54,57,.25);
}

.rank-icon{
  transition: transform .25s ease;
}

.card:hover .rank-icon{
  transform: scale(1.08) rotate(-2deg);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform: translateY(12px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}
    }
  </script>
</body>
</html>
