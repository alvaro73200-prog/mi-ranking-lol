<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard LAN - Team Grey</title>
    <style>
        :root {
            --bg: #060608;
            --card: #121217;
            --accent: #00cfbc;
            --gold: #f0e6d2;
            --master: #ff79c6;
            --diamante: #3498db;
            --esmeralda: #2ecc71;
            --oro: #f1c40f;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
        }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 22px; margin-bottom: 30px; }
        
        .leaderboard-card {
            background: var(--card);
            border: 1px solid #25262d;
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            overflow-x: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th {
             text-align: left;
             color: #a0a0a8;
             font-size: 13px;
             text-transform: uppercase;
             padding: 20px 15px;
             border-bottom: 1px solid #25262d;
        }
        td { padding: 18px 15px; border-bottom: 1px solid #1e1f24; font-size: 14px; }

        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-icon { width: 40px; height: 40px; border-radius: 4px; border: 1px solid #333; }
        .player-name { font-weight: bold; font-size: 16px; text-decoration: none; transition: 0.2s; }
        .player-name:hover { opacity: 0.7; }

        .rank-tag {
            padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        /* Colores de Rango */
        .rank-master { color: var(--master); border-color: var(--master); }
        .rank-diamond, .rank-diamante { color: var(--diamante); border-color: var(--diamante); }
        .rank-emerald, .rank-esmeralda { color: var(--esmeralda); border-color: var(--esmeralda); }
        .rank-gold, .rank-oro { color: var(--oro); border-color: var(--oro); }

        .lp-text { color: #666; font-size: 12px; margin-top: 4px; }
        .win-text { color: #2ecc71; font-weight: bold; }
        .loss-text { color: #e74c3c; font-weight: bold; }
        .winrate-main { font-size: 15px; font-weight: bold; display: block; margin-bottom: 2px; }
        .kda-box { font-weight: bold; color: #eee; }
        .racha-fire { font-size: 16px; font-weight: bold; }

        #mensaje { margin-bottom: 15px; font-size: 12px; color: #555; font-style: italic; }
        .loading { padding: 40px; text-align: center; color: var(--gold); }
    </style>
</head>
<body>
    <h1>Leaderboard LAN</h1>
    <div id="mensaje">Iniciando conexión con Google Cloud...</div>
    
    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>Invocador</th>
                    <th>Rango / LP</th>
                    <th>W/L (WR%)</th>
                    <th>KDA (AVG)</th>
                    <th>Racha</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr><td colspan="5" class="loading">Cargando datos del equipo...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // TU NUEVA URL DE APLICACIÓN WEB
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFxPfnhgOkIHzHMJ3S2TERvDc0OCiWzSUrbLJEOTKSaCWxmE8UUgb9NXXzUxr6gWRZjA/exec";

        // Mantenemos tus colores pasteles personalizados
        function getPlayerColor(name) {
            const colors = {
                'Grey#W8TM': '#ffb347',
                'Azzz#Bou': '#b19cd9',
                'Raven#Aisha': '#ffb7ce',
                'Bodkin Arrow#bhr': '#77dd77',
                'Zenix#4025': '#c3aed6',
                'ForjaEterna#ETRN': '#aec6cf'
            };
            // Si el nombre contiene el tag, intentamos buscarlo en la lista
            return colors[name.trim()] || '#ffffff';
        }

        async function cargarDatos() {
            try {
                const response = await fetch(WEB_APP_URL + "?cb=" + Date.now());
                const data = await response.json();
                const table = document.getElementById('table-content');
                
                if (data.length === 0) {
                    table.innerHTML = '<tr><td colspan="5" class="loading">El Excel parece estar vacío.</td></tr>';
                    return;
                }

                document.getElementById('mensaje').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
                table.innerHTML = "";

                data.forEach(p => {
                    const r = (p.rango || "").toLowerCase();
                    // Detectar clase de rango para el color de la etiqueta
                    let rClass = '';
                    if (r.includes('master')) rClass = 'rank-master';
                    else if (r.includes('diam') || r.includes('diamond')) rClass = 'rank-diamante';
                    else if (r.includes('esmer') || r.includes('emerald')) rClass = 'rank-esmeralda';
                    else if (r.includes('oro') || r.includes('gold')) rClass = 'rank-oro';

                    const customColor = getPlayerColor(p.jugador);
                    const nameParts = p.jugador.split('#');
                    const opggUrl = `https://www.op.gg/summoners/lan/${encodeURIComponent(nameParts[0])}-${encodeURIComponent(nameParts[1] || '')}`;

                    table.innerHTML += `
                        <tr>
                            <td>
                                <div class="player-info">
                                    <img class="player-icon" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/profileicon/${p.icono}.png">
                                    <a href="${opggUrl}" target="_blank" class="player-name" style="color: ${customColor}">${p.jugador}</a>
                                </div>
                            </td>
                            <td>
                                <span class="rank-tag ${rClass}">${p.rango || 'SIN RANGO'}</span>
                                <div class="lp-text">${p.lp || '0 LP'}</div>
                            </td>
                            <td>
                                <span class="winrate-main">${p.winrate || '0%'}</span>
                                <span class="win-text">${p.wins || 0}W</span> / <span class="loss-text">${p.losses || 0}L</span>
                            </td>
                            <td class="kda-box">${p.kda || '0.00'}</td>
                            <td class="racha-fire">${p.racha || '--'}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('mensaje').innerText = "Error de conexión. Revisa la implementación del Script.";
            }
        }

        // Carga inicial y actualización cada 60 segundos
        cargarDatos();
        setInterval(cargarDatos, 60000);
    </script>
</body>
</html>
