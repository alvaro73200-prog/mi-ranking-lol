<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Leaderboard - Team Grey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #09090c;
            --card-bg: #121217;
            --border-color: #25262d;
            --text-primary: #f0e6d2; /* Dorado LoL */
            --text-secondary: #a0a0a8;
            --accent: #00cfbc; /* Color cian de la imagen */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-primary);
        }

        .leaderboard-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 10px;
            border-bottom: 1px solid #1e1f24;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .pos {
            color: var(--text-secondary);
            font-weight: bold;
            width: 40px;
        }

        .name {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .rank-tag {
            background: #1e1f24;
            color: #c8aa6e;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #3c3c41;
        }

        .lp-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lp-bar-bg {
            height: 4px;
            background: #25262d;
            width: 60px;
            border-radius: 2px;
            overflow: hidden;
        }

        .lp-bar-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .lp-text {
            color: var(--accent);
            font-weight: bold;
            min-width: 50px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

        <h1>Leaderboard LAN</h1>
        <div class="leaderboard-card">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jugador</th>
                        <th>Rango</th>
                        <th>Puntuación</th>
                    </tr>
