<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111820;
      --panel2:#16202b;
      --text:#e7edf4;
      --muted:#8a97a6;
      --accent:#d13639;
      --line:#243140;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --good:#4ade80;
      --info:#60a5fa;
      --warn:#f59e0b;
      --purple:#a855f7;
      --emerald:#19c37d;
      --gold:#f5c542;
      --diamond:#4aa3ff;
      --master:#a855f7;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
      color:var(--text);
      font-family:"Segoe UI", Inter, Arial, sans-serif;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    .title{
      margin:0 0 18px;
      font-size:44px;
      font-weight:900;
      letter-spacing:1px;
      font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;
      text-align:left;
      color:#f4f7fb;
      text-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(209,54,57,.25);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:18px;
    }

    .card{
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(17,24,32,.78) 0%, rgba(22,32,43,.92) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
      min-height:260px;
      display:flex;
      flex-direction:column;
      gap:14px;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: fadeUp .35s ease both;
      cursor:pointer;
      background-size:cover;
      background-position:center;
    }

    .card::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(11,15,20,.42) 0%, rgba(11,15,20,.88) 100%);
      z-index:0;
    }

    .card > *{
      position:relative;
      z-index:1;
    }

    .card:hover{
      transform: translateY(-6px);
      border-color: rgba(209,54,57,.55);
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-direction:column;
      text-align:center;
    }

    .name{
      font-size:20px;
      font-weight:800;
      line-height:1.1;
      text-align:center;
    }

    .tag{
      color:var(--muted);
      margin-top:4px;
      font-size:13px;
      text-align:center;
    }

    .rank{
      font-size:15px;
      font-weight:700;
      color:#f0f4f8;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      text-align:center;
    }

    .profile-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-top:2px;
    }

    .level-badge{
      font-size:12px;
      font-weight:900;
      letter-spacing:.04em;
      color:#fff;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      text-align:center;
    }

    .profile-icon{
      width:64px;
      height:64px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.15);
      object-fit:cover;
      background:#111820;
      box-shadow:0 8px 20px rgba(0,0,0,.35);
    }

    .center-text{
      text-align:center;
    }

    .emerald{ color:var(--emerald); }
    .gold{ color:var(--gold); }
    .diamond{ color:var(--diamond); }
    .master{ color:var(--master); }

    .footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
    }

    .status{
      margin-top:12px;
      color:var(--muted);
    }

    .empty{
      grid-column:1/-1;
      padding:20px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(3, 8, 12, .82);
      backdrop-filter: blur(8px);
      z-index:9999;
      padding:18px;
    }

    .modal.open{
      display:flex;
    }

    .modal-card{
      width:min(980px, 100%);
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(17,24,32,.98), rgba(22,32,43,.98));
      box-shadow:0 30px 80px rgba(0,0,0,.55);
      color:var(--text);
      position:relative;
    }

    .modal-banner{
      min-height:220px;
      padding:22px;
      display:flex;
      align-items:flex-end;
      background:
        linear-gradient(90deg, rgba(11,15,20,.94) 0%, rgba(11,15,20,.65) 45%, rgba(11,15,20,.2) 100%),
        center/cover no-repeat;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .modal-content{
      padding:18px;
    }

    .modal-close{
      position:absolute;
      top:14px;
      right:14px;
      width:40px;
      height:40px;
      border:0;
      border-radius:50%;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      z-index:2;
    }

    .modal-details{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:12px;
      margin-top:14px;
    }

    .modal-item{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:12px;
    }

    .modal-item .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .modal-item .value{
      font-size:17px;
      font-weight:800;
      word-break:break-word;
    }

    .value.good{ color:var(--good); }
    .value.info{ color:var(--info); }
    .value.warn{ color:var(--warn); }
    .value.purple{ color:var(--purple); }

    .champ-card{
      margin-top:14px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      width:fit-content;
    }

    .champ-card img{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.1);
    }

    .champ-card .champ-name{
      font-size:16px;
      font-weight:900;
      color:#fff;
      line-height:1.1;
    }

    .champ-card .champ-sub{
      font-size:12px;
      color:var(--muted);
      margin-top:3px;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform: translateY(12px);
      }
      to{
        opacity:1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px){
      body{ padding:16px; }
      .cards{ grid-template-columns:1fr; }
      .card{ padding:14px; min-height:240px; }
      .title{ font-size:36px; }
      .rank-icon{ width:50px; height:50px; min-width:50px; min-height:50px; }
      .modal-banner{ min-height:180px; }
      .champ-card{ width:100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Tracker</h1>

    <div class="topbar">
      <button onclick="loadData()">Cargar datos</button>
    </div>

    <div id="cards" class="cards">
      <div class="empty">Presiona “Cargar datos” para ver los jugadores.</div>
    </div>

    <div id="status" class="status"></div>
    <div class="footer">Datos cargados desde Google Sheets con tu CSV público.</div>
  </div>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modalBanner" class="modal-banner">
        <div class="banner-content">
          <h1 id="modalTitle" style="margin:0 0 6px;font-size:34px;">Jugador</h1>
          <p id="modalSubtitle" style="margin:0;color:var(--muted);font-weight:700;"></p>
          <div id="modalChampCard" class="champ-card" style="display:none;"></div>
        </div>
      </div>
      <div class="modal-content">
        <div id="modalDetails" class="modal-details"></div>
      </div>
    </div>
  </div>

  <script src="./data.js"></script>
  <script>
    const STORAGE_KEY = 'lol-tracker-cards';
    let currentData = [];

    function getRankIcon(rango) {
      const r = String(rango || '').toLowerCase();
      if (r.includes('iron')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-iron.png';
      if (r.includes('bronze')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-bronze.png';
      if (r.includes('silver')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-silver.png';
      if (r.includes('gold')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-gold.png';
      if (r.includes('platinum')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-platinum.png';
      if (r.includes('emerald')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-emerald.png';
      if (r.includes('diamond')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-diamond.png';
      if (r.includes('master')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-master.png';
      if (r.includes('grandmaster')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-grandmaster.png';
      if (r.includes('challenger')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-challenger.png';
      return '';
    }

    function getChampionSplash(name) {
      const champ = String(name || '').trim();
      if (!champ) return '';
      return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champ}_0.jpg`;
    }

    function getChampionSquare(name) {
      const champ = String(name || '').trim();
      if (!champ) return '';
      return `https://ddragon.leagueoflegends.com/cdn/14.10.1/img/champion/${champ}.png`;
    }

    function cleanValue(v) {
      return (v === null || v === undefined) ? '' : String(v);
    }

    function getRankClass(rango) {
      const r = String(rango || '').toUpperCase();
      if (r.includes('EMERALD')) return 'emerald';
      if (r.includes('GOLD')) return 'gold';
      if (r.includes('DIAMOND')) return 'diamond';
      if (r.includes('MASTER')) return 'master';
      return '';
    }

    function setCardBackground(card, row) {
      const champ = row?.champMaestriaNombre || row?.ultimoCampeon || '';
      const splash = getChampionSplash(champ);
      if (splash) {
        card.style.backgroundImage = `linear-gradient(180deg, rgba(17,24,32,.78) 0%, rgba(22,32,43,.92) 100%), url('${splash}')`;
      }
    }

    function openModal(row) {
      const modal = document.getElementById('modal');
      const title = document.getElementById('modalTitle');
      const subtitle = document.getElementById('modalSubtitle');
      const details = document.getElementById('modalDetails');
      const banner = document.getElementById('modalBanner');
      const champCard = document.getElementById('modalChampCard');

      const champ = row.champMaestriaNombre || row.ultimoCampeon || '';
      const splash = getChampionSplash(champ);
      const champIcon = getChampionSquare(champ);

      title.textContent = row.jugador || '';
      subtitle.textContent = row.tag ? `#${row.tag}` : '';

      banner.style.background = splash
        ? `linear-gradient(90deg, rgba(11,15,20,.94) 0%, rgba(11,15,20,.65) 45%, rgba(11,15,20,.2) 100%), url('${splash}') center/cover no-repeat`
        : `linear-gradient(90deg, rgba(11,15,20,.94) 0%, rgba(11,15,20,.65) 45%, rgba(11,15,20,.2) 100%)`;

      if (champ) {
        champCard.style.display = 'flex';
        champCard.innerHTML = `
          ${champIcon ? `<img src="${champIcon}" alt="${champ}">` : ''}
          <div>
            <div class="champ-name">${cleanValue(champ)}</div>
            <div class="champ-sub">Campeón con más maestría</div>
          </div>
        `;
      } else {
        champCard.style.display = 'none';
        champCard.innerHTML = '';
      }

      details.innerHTML = `
        <div class="modal-item"><div class="label">Rango</div><div class="value ${getRankClass(row.rango)}">${cleanValue(row.rango)}</div></div>
        <div class="modal-item"><div class="label">LP</div><div class="value info">${cleanValue(row.lp)}</div></div>
        <div class="modal-item"><div class="label">Victorias</div><div class="value">${cleanValue(row.wins || row.victorias)}</div></div>
        <div class="modal-item"><div class="label">Derrotas</div><div class="value">${cleanValue(row.losses || row.derrotas)}</div></div>
        <div class="modal-item"><div class="label">Winrate</div><div class="value warn">${cleanValue(row.winRate)}</div></div>
        <div class="modal-item"><div class="label">Nivel</div><div class="value">${cleanValue(row.nivel)}</div></div>
        <div class="modal-item"><div class="label">Último Campeón</div><div class="value">${cleanValue(row.ultimoCampeon)}</div></div>
        <div class="modal-item"><div class="label">Pentas</div><div class="value">${cleanValue(row.pentas)}</div></div>
        <div class="modal-item"><div class="label">Visión</div><div class="value good">${cleanValue(row.vision)}</div></div>
        <div class="modal-item"><div class="label">KDA</div><div class="value">${cleanValue(row.kda)}</div></div>
        <div class="modal-item"><div class="label">KP%</div><div class="value warn">${cleanValue(row.kp)}</div></div>
        <div class="modal-item"><div class="label">DPM</div><div class="value purple">${cleanValue(row.dpm)}</div></div>
      `;

      modal.classList.add('open');
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal').classList.remove('open');
    }

    function renderCards(data, message = '') {
      const cards = document.getElementById('cards');
      const status = document.getElementById('status');

      if (!data.length) {
        cards.innerHTML = '<div class="empty">No se encontraron datos.</div>';
        status.textContent = message;
        return;
      }

      cards.innerHTML = data.map((row, idx) => {
        const icon = getRankIcon(row.rango);
        const rankClass = getRankClass(row.rango);
        return `
          <article class="card" onclick="openModal(currentData[${idx}])">
            <div class="profile-wrap">
              <div class="level-badge">${cleanValue(row.nivel) || '0'}</div>
              <img class="profile-icon" src="https://ddragon.leagueoflegends.com/cdn/14.8.1/img/profileicon/${cleanValue(row.profileIconId)}.png" alt="Perfil">
            </div>

            <div class="card-head">
              <div>
                <div class="name center-text">${cleanValue(row.jugador)}</div>
                <div class="tag center-text">${cleanValue(row.tag) ? '#' + cleanValue(row.tag) : ''}</div>
              </div>
            </div>

            <div class="rank ${rankClass}">
              <span>${cleanValue(row.rango)}</span>
            </div>
          </article>
        `;
      }).join('');

      [...cards.querySelectorAll('.card')].forEach((card, idx) => setCardBackground(card, data[idx]));
      status.textContent = message;
    }

    function saveCards(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadSavedCards() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    async function loadData() {
      const status = document.getElementById('status');
      try {
        status.textContent = 'Cargando...';
        const data = await window.fetchData();
        currentData = data;
        saveCards(data);
        renderCards(data, `Actualizado: ${new Date().toLocaleString()}`);
      } catch (err) {
        const saved = loadSavedCards();
        currentData = saved;
        if (saved.length) {
          renderCards(saved, 'Mostrando datos guardados.');
        } else {
          renderCards([], `Error: ${err.message}`);
        }
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadSavedCards();
      currentData = saved;
      if (saved.length) {
        renderCards(saved, 'Mostrando datos guardados.');
      }
    });
  </script>
</body>
</html>
