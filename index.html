<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Pro - Team Grey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #060608;
            --card: #121217;
            --accent: #00cfbc;
            --gold: #f0e6d2;
            --master: #ff79c6;
            --diamante: #3498db;
            --esmeralda: #2ecc71;
            --oro: #f1c40f;
            --hierro: #a19d94;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; }
        .refresh-timer { font-size: 12px; color: #666; font-family: monospace; }

        /* Contenedor de Gráfica */
        .chart-container {
            background: var(--card);
            border: 1px solid #25262d;
            border-radius: 12px;
            width: 100%;
            max-width: 950px;
            padding: 20px;
            margin-bottom: 20px;
            height: 300px;
        }

        .leaderboard-card {
            background: var(--card);
            border: 1px solid #25262d;
            border-radius: 12px;
            width: 100%;
            max-width: 950px;
            overflow-x: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: #a0a0a8; font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid #25262d; }
        td { padding: 15px; border-bottom: 1px solid #1e1f24; font-size: 14px; }

        /* Estilos de Rango e Iconos */
        .rank-container { display: flex; align-items: center; gap: 10px; }
        .rank-icon { width: 35px; height: 35px; object-fit: contain; }
        .rank-tag { font-weight: bold; text-transform: uppercase; font-size: 12px; }

        /* Colores dinámicos */
        .color-master { color: var(--master); }
        .color-diamante { color: var(--diamante); }
        .color-esmeralda { color: var(--esmeralda); }
        .color-oro { color: var(--oro); }

        .lp-text { color: var(--accent); font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        
        /* Sugerencias y Tips */
        .sugerencia-box {
            font-size: 11px;
            background: rgba(255,255,255,0.05);
            padding: 5px 8px;
            border-radius: 4px;
            margin-top: 5px;
            color: #aaa;
            border-left: 2px solid var(--accent);
        }

        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .player-name { font-weight: bold; font-size: 16px; text-decoration: none; }
        .fire-icon { color: #ff4e50; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE MONITOREO LAN</h1>
        <div id="timer" class="refresh-timer">Sincronizando datos...</div>
    </div>

    <div class="chart-container">
        <canvas id="lpChart"></canvas>
    </div>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invocador / Sugerencia</th>
                    <th>Rango & Icono</th>
                    <th>Puntos (LP)</th>
                    <th>Rendimiento (WR)</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="table-content">
                </tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';
        let myChart;

        // Diccionario de Sugerencias (Lo que me pediste guardar)
        const sugerencias = {
            'Grey#W8TM': '¡Sigue con Hwei! Controla mejor la wave en el nivel 6.',
            'Azzz#Bou': 'Buen KDA. Prueba rotar más a bot después de la primera torre.',
            'Raven#Aisha': 'Focus en el farm. Intenta llegar a 8 CS/min.',
            'Bodkin Arrow#bhr': 'La racha está 🔥. Sigue con el mismo pool de campeones.',
            'Zenix#4025': 'Cuidado con los gankeos nivel 3. Wardea más profundo.',
            'ForjaEterna#ETRN': 'Tu winrate es sólido. ¡Sigue así!'
        };

        function getPlayerColor(name) {
            const colors = {
                'Grey#W8TM': '#ffb347', 'Azzz#Bou': '#b19cd9', 'Raven#Aisha': '#ffb7ce',
                'Bodkin Arrow#bhr': '#77dd77', 'Zenix#4025': '#c3aed6', 'ForjaEterna#ETRN': '#aec6cf'
            };
            return colors[name] || '#ffffff';
        }

        function initChart(labels, data, colors) {
            const ctx = document.getElementById('lpChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'League Points (LP)',
                        data: data,
                        backgroundColor: colors,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#25262d' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function loadData() {
            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const sorted = results.data.sort((a,b) => parseInt(b.LP || 0) - parseInt(a.LP || 0));
                    render(sorted);
                    
                    // Preparar datos para la gráfica
                    const labels = sorted.map(p => p.Jugador.split('#')[0]);
                    const lpData = sorted.map(p => parseInt(p.LP || 0));
                    const colors = sorted.map(p => getPlayerColor(p.Jugador.trim()));
                    initChart(labels, lpData, colors);
                    
                    document.getElementById('timer').innerText = "Última actualización: " + new Date().toLocaleTimeString();
                }
            });
        }

        function render(players) {
            const container = document.getElementById('table-content');
            let html = '';

            players.forEach((p, i) => {
                const fullID = p.Jugador.trim();
                const nameOnly = fullID.split('#')[0];
                const rankStr = (p.Rango || "SIN RANGO").toUpperCase();
                const customColor = getPlayerColor(fullID);
                
                // Lógica de Iconos (Riot Assets)
                let tier = rankStr.split(' ')[0] || "UNRANKED";
                if(tier === "SIN") tier = "IRON"; // Placeholder
                const iconUrl = `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-${tier.toLowerCase()}.png`;

                const isOnline = p["Campeón"] && p["Campeón"].includes("Online");
                const hasFire = p["Racha"] && p["Racha"].includes("🔥");

                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td>
                            <a href="https://www.op.gg/summoners/lan/${fullID.replace('#','-')}" target="_blank" class="player-name" style="color:${customColor}">
                                ${fullID} ${hasFire ? '<i class="fas fa-fire fire-icon"></i>' : ''}
                            </a>
                            <div class="sugerencia-box">
                                <i class="fas fa-lightbulb" style="color:var(--gold)"></i> ${sugerencias[fullID] || 'Continúa jugando para recibir tips.'}
                            </div>
                        </td>
                        <td>
                            <div class="rank-container">
                                <img src="${iconUrl}" class="rank-icon" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-unranked.png'">
                                <span class="rank-tag color-${tier.toLowerCase()}">${rankStr}</span>
                            </div>
                        </td>
                        <td class="lp-text">${p.LP || 0} LP</td>
                        <td>
                            <div style="font-weight:bold">${p["WR%"] || '0%'}</div>
                            <div style="font-size:10px; color:#666">${p["V/D"] || '0W/0D'}</div>
                        </td>
                        <td>
                            ${isOnline ? '<span><span class="live-pulse"></span>Online</span>' : '<span style="color:#444">Offline</span>'}
                            <div style="font-size:10px; color:#555">LVL ${p["Estado Live"]?.replace('Nivel: ','') || '--'}</div>
                        </td>
                    </tr>
                `;
            });
            container.innerHTML = html;
        }

        // Auto-refresh cada 5 minutos
        setInterval(loadData, 300000);
        window.onload = loadData;
    </script>
</body>
</html>
