<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard LAN - Team Grey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #09090c;
            --card: #121217;
            --border: #25262d;
            --text: #f0e6d2;
            /* Colores de Rangos */
            --oro: #f1c40f;
            --esmeralda: #2ecc71;
            --diamante: #3498db;
            --master: #ff79c6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .leaderboard-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #a0a0a8; font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #1e1f24; }

        /* Lógica de colores por clase */
        .rank-tag {
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .rank-oro { color: var(--oro); border-color: var(--oro); }
        .rank-esmeralda { color: var(--esmeralda); border-color: var(--esmeralda); }
        .rank-diamante { color: var(--diamante); border-color: var(--diamante); }
        .rank-master { color: var(--master); border-color: var(--master); }
        .rank-default { color: #888; border-color: #444; }

        .lp-text { color: #00cfbc; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <h1>LEADERBOARD LAN</h1>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invocador</th>
                    <th>Rango</th>
                    <th>Puntuación</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr><td colspan="4" style="text-align:center; padding:40px;">Sincronizando...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    const players = results.data.slice(1).filter(r => r[0]);
                    players.sort((a, b) => parseInt(b[2] || 0) - parseInt(a[2] || 0));
                    render(players);
                }
            });
        }

        function render(players) {
            const container = document.getElementById('table-content');
            let html = '';

            players.forEach((p, i) => {
                const rangoOriginal = p[1] ? p[1].toLowerCase() : '';
                let colorClass = 'rank-default';

                // Asignación de colores
                if (rangoOriginal.includes('oro')) colorClass = 'rank-oro';
                else if (rangoOriginal.includes('esmeralda')) colorClass = 'rank-esmeralda';
                else if (rangoOriginal.includes('diamante')) colorClass = 'rank-diamante';
                else if (rangoOriginal.includes('master') || rangoOriginal.includes('maestro')) colorClass = 'rank-master';

                html += `
                    <tr>
                        <td style="color:#555">${i + 1}</td>
                        <td style="font-weight:bold">${p[0]}</td>
                        <td><span class="rank-tag ${colorClass}">${p[1] || '---'}</span></td>
                        <td class="lp-text">${p[2] || 0} LP</td>
                    </tr>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = loadData;
    </script>
</body>
</html>
