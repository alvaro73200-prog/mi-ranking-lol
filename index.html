<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#eee;padding:24px}
    button{padding:10px 14px;border:0;border-radius:8px;background:#d33;color:#fff;cursor:pointer}
    table{width:100%;margin-top:16px;border-collapse:collapse;background:#1b1b1b;border-radius:10px;overflow:hidden}
    th,td{padding:12px;border-bottom:1px solid #333;text-align:left}
  </style>
</head>
<body>
  <h1>LOL Tracker LAN</h1>
  <button onclick="loadData()">Cargar datos</button>

  <table>
    <thead>
      <tr>
        <th>Jugador</th>
        <th>Rango</th>
        <th>LP</th>
        <th>WR</th>
        <th>V/D</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr>
        <td colspan="5">Presiona el botón...</td>
      </tr>
    </tbody>
  </table>

  <script src="./data.js"></script>
  <script>
    function getRankIcon(rango) {
      const r = String(rango || '').toLowerCase();
      if (r.includes('iron')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-iron.png';
      if (r.includes('bronze')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-bronze.png';
      if (r.includes('silver')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-silver.png';
      if (r.includes('gold')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-gold.png';
      if (r.includes('platinum')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-platinum.png';
      if (r.includes('emerald')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-emerald.png';
      if (r.includes('diamond')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-diamond.png';
      if (r.includes('master')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-master.png';
      if (r.includes('grandmaster')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-grandmaster.png';
      if (r.includes('challenger')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-challenger.png';
      return '';
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      try {
        const data = await window.fetchData();
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="5">No se encontraron datos.</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(row => {
          const icon = getRankIcon(row.rango);
          return `
            <tr>
              <td>${row.jugador}${row.tag ? '#' + row.tag : ''}</td>
              <td>
                <div style="display:flex;align-items:center;gap:10px;">
                  ${icon ? `<img src="${icon}" alt="${row.rango}" style="width:52px;height:52px;object-fit:contain;">` : ''}
                  <span>${row.rango}</span>
                </div>
              </td>
              <td>${row.lp} LP</td>
              <td>${row.wr}</td>
              <td>${row.vd}</td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5">Error: ${err.message}</td></tr>`;
      }
    }
  </script>
</body>
</html>
