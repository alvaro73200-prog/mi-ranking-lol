<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111820;
      --panel2:#16202b;
      --text:#e7edf4;
      --muted:#8a97a6;
      --accent:#d13639;
      --line:#243140;
      --shadow:0 12px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
      color:var(--text);
      font-family:"Segoe UI", Inter, Arial, sans-serif;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
      letter-spacing:.5px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
    }

    button:hover{filter:brightness(1.05)}

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
      min-height:220px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card-head{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .rank-icon{
      width:56px;
      height:56px;
      min-width:56px;
      min-height:56px;
      object-fit:contain;
      display:block;
    }

    .name{
      font-size:20px;
      font-weight:800;
      line-height:1.1;
    }

    .tag{
      color:var(--muted);
