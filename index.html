<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111820;
      --panel2:#16202b;
      --text:#e7edf4;
      --muted:#8a97a6;
      --accent:#d13639;
      --line:#243140;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --good:#4ade80;
      --info:#60a5fa;
      --warn:#f59e0b;
      --purple:#a855f7;
      --emerald:#19c37d;
      --gold:#f5c542;
      --diamond:#4aa3ff;
      --master:#a855f7;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
      color:var(--text);
      font-family:"Segoe UI", Inter, Arial, sans-serif;
    }

    .container{
      max-width:1400px;
      margin:0 auto;
    }

    .title{
      margin:0 0 18px;
      font-size:48px;
      font-weight:900;
      letter-spacing:1px;
      font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;
      text-align:center;
      color:#f4f7fb;
      text-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(209,54,57,.25);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0, 1.35fr) minmax(340px, .95fr);
      gap:18px;
      align-items:start;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:18px;
    }

    .sidebar{
      position:sticky;
      top:18px;
      background:linear-gradient(180deg, rgba(17,24,32,.92), rgba(22,32,43,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:16px;
      min-height:420px;
    }

    .sidebar h2{
      margin:0 0 12px;
      font-size:18px;
      letter-spacing:.3px;
    }

    .chart-wrap{ position:relative; height:360px; width:100%; }
    .chart-empty{ color:var(--muted); font-size:13px; line-height:1.5; padding:10px 0 0; }

    .card{
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(17,24,32,.78) 0%, rgba(22,32,43,.92) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
      min-height:280px;
      display:flex;
      flex-direction:column;
      gap:14px;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: fadeUp .35s ease both;
      cursor:pointer;
      background-size:cover;
      background-position:center;
    }

    .card::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(11,15,20,.42) 0%, rgba(11,15,20,.88) 100%);
      z-index:0;
    }

    .card > *{ position:relative; z-index:1; }

    .card:hover{
      transform: translateY(-6px);
      border-color: rgba(209,54,57,.55);
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }

    .profile-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:2px;
      width:100%;
    }

    .level-badge{
      font-size:12px;
      font-weight:900;
      letter-spacing:.04em;
      color:#fff;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      text-align:center;
      min-width:44px;
    }

    .profile-icon{
      width:72px;
      height:72px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.18);
      object-fit:cover;
      object-position:center;
      background:#111820;
      box-shadow:0 10px 22px rgba(0,0,0,.35);
      display:block;
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      margin-top:2px;
    }

    .name{
      font-size:24px;
      font-weight:900;
      line-height:1.05;
      text-align:center;
      word-break:break-word;
    }

    .tag{ display:none; }

    .rank{
      font-size:15px;
      font-weight:700;
      color:#f0f4f8;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      text-align:center;
      margin-top:auto;
    }

    .center-text{ text-align:center; }

    .emerald{ color:var(--emerald); }
    .gold{ color:var(--gold); }
    .diamond{ color:var(--diamond); }
    .master{ color:var(--master); }

    .footer{ margin-top:18px; color:var(--muted); font-size:13px; }
    .status{ margin-top:12px; color:var(--muted); }

    .empty{
      grid-column:1/-1;
      padding:20px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:rgba(255,255,255,.02);
      text-align:center;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(3, 8, 12, .84);
      backdrop-filter: blur(10px);
      z-index:9999;
      padding:24px;
    }

    .modal.open{ display:flex; animation: modalFade .18s ease-out; }

    .modal-card{
      width:min(1060px, 100%);
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(17,24,32,.98), rgba(22,32,43,.98));
      box-shadow:0 32px 90px rgba(0,0,0,.6);
      color:var(--text);
      position:relative;
      transform-origin:center;
      animation: modalPop .22s ease-out;
    }

    .modal-banner{
      min-height:250px;
      padding:26px;
      display:flex;
      align-items:flex-end;
      background:linear-gradient(90deg, rgba(11,15,20,.88) 0%, rgba(11,15,20,.52) 45%, rgba(11,15,20,.12) 100%), center/cover no-repeat;
      border-bottom:1px solid rgba(255,255,255,.06);
      position:relative;
    }

    .modal-banner::after{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 70% 20%, rgba(255,255,255,.08), transparent 32%);
      pointer-events:none;
    }

    .modal-content{ padding:26px; }

    .modal-close{
      position:absolute;
      top:14px;
      right:14px;
      width:42px;
      height:42px;
      border:0;
      border-radius:50%;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
      z-index:2;
    }

    .modal-actions{
      position:absolute;
      top:18px;
      right:68px;
      display:flex;
      gap:8px;
      z-index:3;
    }

    .modal-actions a{
      width:30px;
      height:30px;
      border-radius:50%;
      display:grid;
      place-items:center;
      text-decoration:none;
      font-size:11px;
      font-weight:900;
      color:#fff;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      transition:.2s ease;
    }

    .modal-actions a:hover{
      transform:translateY(-2px);
      background:rgba(209,54,57,.35);
    }

    .modal-details{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:14px;
      margin-top:16px;
    }

    .modal-item{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:14px;
    }

    .modal-item .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .modal-item .value{
      font-size:18px;
      font-weight:800;
      word-break:break-word;
    }

    .value.good{ color:var(--good); }
    .value.info{ color:var(--info); }
    .value.warn{ color:var(--warn); }
    .value.purple{ color:var(--purple); }

    .champ-card{
      margin-top:16px;
      display:flex;
      align-items:center;
      gap:14px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      width:fit-content;
      box-shadow:0 14px 28px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
    }

    .champ-card img{
      width:60px;
      height:60px;
      border-radius:16px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.12);
      background:#111820;
    }

    .champ-card .champ-name{
      font-size:17px;
      font-weight:900;
      color:#fff;
      line-height:1.1;
    }

    .champ-card .champ-sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .tips{
      margin-top:18px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      color:#dbe7f5;
      line-height:1.5;
    }

    .tips strong{ color:#fff; }

    .match-section{ margin-top:20px; }
    .match-section h3{ margin:0 0 12px; font-size:16px; color:#f4f7fb; }

    .match-table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:16px;
      background:rgba(255,255,255,.03);
    }

    .match-table th,
    .match-table td{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
      font-size:13px;
    }

    .match-table th{
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .group-history{
      margin-top:22px;
      background:linear-gradient(180deg, rgba(17,24,32,.92), rgba(22,32,43,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .group-history h2{
      margin:0 0 12px;
      font-size:18px;
    }

    .group-history .chart-wrap{
      height:280px;
    }

    @keyframes fadeUp{
      from{ opacity:0; transform: translateY(12px); }
      to{ opacity:1; transform: translateY(0); }
    }

    @keyframes modalFade{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @keyframes modalPop{
      from{ opacity:0; transform: translateY(16px) scale(.98); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 980px){
      .layout{ grid-template-columns:1fr; }
      .sidebar{ position:relative; top:auto; }
    }

    @media (max-width: 640px){
      body{ padding:14px; }
      .cards{ grid-template-columns:1fr; gap:14px; }
      .card{ padding:16px; min-height:250px; }
      .title{ font-size:36px; }
      .profile-icon{ width:66px; height:66px; }
      .modal{ padding:12px; }
      .modal-banner{ min-height:190px; padding:18px; }
      .modal-content{ padding:18px; }
      .modal-details{ grid-template-columns:1fr; }
      .champ-card{ width:100%; }
      .tips{ font-size:14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Tracker</h1>

    <div class="topbar">
      <button onclick="loadData()">Cargar datos</button>
    </div>

    <div class="layout">
      <div>
        <div id="cards" class="cards">
          <div class="empty">Presiona “Cargar datos” para ver los jugadores.</div>
        </div>
      </div>

      <aside class="sidebar">
        <h2>Historial individual</h2>
        <div class="chart-wrap">
          <canvas id="historyChart"></canvas>
        </div>
        <div class="chart-empty">La gráfica mostrará el Elo Real del jugador seleccionado.</div>
      </aside>
    </div>

    <div class="group-history">
      <h2>Historial grupal</h2>
      <div class="chart-wrap">
        <canvas id="groupChart"></canvas>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div class="footer">Datos cargados desde Google Sheets con tu CSV público.</div>
  </div>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-actions">
        <a id="linkOpgg" target="_blank" rel="noopener noreferrer" title="OP.GG">OP</a>
        <a id="linkDpm" target="_blank" rel="noopener noreferrer" title="DPM.LOL">DP</a>
        <a id="linkGol" target="_blank" rel="noopener noreferrer" title="LeagueOfGraphs">LG</a>
        <a id="linkUgg" target="_blank" rel="noopener noreferrer" title="u.gg">UG</a>
      </div>
      <div id="modalBanner" class="modal-banner">
        <div class="banner-content">
          <h1 id="modalTitle" style="margin:0 0 8px;font-size:36px;">Jugador</h1>
          <p id="modalSubtitle" style="margin:0;color:var(--muted);font-weight:700;"></p>
          <div id="modalChampCard" class="champ-card" style="display:none;"></div>
        </div>
      </div>
      <div class="modal-content">
        <div id="modalDetails" class="modal-details"></div>
        <div id="modalTips" class="tips"></div>
        <div class="match-section">
          <h3>Últimas 10 partidas del jugador</h3>
          <table class="match-table">
            <thead>
              <tr>
                <th>Campeón</th>
                <th>Resultado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="playerMatchRows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="./data.js"></script>
  <script>
    const STORAGE_KEY = 'lol-tracker-cards';
    let currentData = [];
    let historyChart = null;
    let groupChart = null;
    let selectedPlayer = null;

    function parseNum(v) {
      const n = parseFloat(String(v).replace(/[^\d.-]/g, ''));
      return Number.isFinite(n) ? n : 0;
    }

    function getRankBaseValue(rango) {
      const r = String(rango || '').toUpperCase();
      if (r.includes('IRON')) return 0;
      if (r.includes('BRONZE')) return 400;
      if (r.includes('SILVER')) return 800;
      if (r.includes('GOLD')) return 1200;
      if (r.includes('PLATINUM')) return 1600;
      if (r.includes('EMERALD')) return 2000;
      if (r.includes('DIAMOND')) return 2400;
      if (r.includes('MASTER')) return 2800;
      if (r.includes('GRANDMASTER')) return 3200;
      if (r.includes('CHALLENGER')) return 3600;
      return 0;
    }

    function getEloReal(row) { return getRankBaseValue(row.rango) + parseNum(row.lp); }

    function getRealWinrate(row) {
      const wins = parseNum(row.wins ?? row.victorias);
      const losses = parseNum(row.losses ?? row.derrotas);
      const total = wins + losses;
      if (!total) return '0.0%';
      return ((wins / total) * 100).toFixed(1) + '%';
    }

    function buildExternalLinks(row) {
      const name = String(row.jugador || '').trim();
      const tag = String(row.tag || '').trim();
      const opgg = `https://op.gg/lol/summoners/lan/${encodeURIComponent(name)}-${encodeURIComponent(tag)}`;
      const dpm = `https://dpm.lol/${encodeURIComponent(name)}-${encodeURIComponent(tag)}`;
      const ugg = `https://u.gg/lol/profile/la1/${encodeURIComponent(name.toLowerCase())}-${encodeURIComponent(tag.toLowerCase())}/overview`;
      const lg = `https://www.leagueofgraphs.com/es/summoner/lan/${encodeURIComponent(name)}-${encodeURIComponent(tag)}`;
      return { opgg, dpm, ugg, lg };
    }

    function getAllMatchesFromGroup(data) {
      const all = [];
      data.forEach(player => {
        const matches = player.partidas || player.matches || [];
        matches.forEach(m => {
          all.push({
            jugador: player.jugador || '',
            campeon: m.champion || m.champ || m.campeon || '',
            resultado: m.result || m.win || m.victory || '',
            fecha: m.timestamp || m.date || m.fecha || ''
          });
        });
      });
      return all.sort((a, b) => (new Date(b.fecha).getTime() || 0) - (new Date(a.fecha).getTime() || 0)).slice(0, 10);
    }

    function getPlayerMatches(row) {
      const matches = row.partidas || row.matches || [];
      return matches.slice().sort((a, b) => (new Date(b.timestamp || b.date || b.fecha).getTime() || 0) - (new Date(a.timestamp || a.date || a.fecha).getTime() || 0)).slice(0, 10);
    }

    function renderPlayerMatches(row) {
      const tbody = document.getElementById('playerMatchRows');
      const matches = getPlayerMatches(row);
      tbody.innerHTML = matches.length ? matches.map(m => `
        <tr>
          <td>${cleanValue(m.champion || m.champ || m.campeon || '')}</td>
          <td>${cleanValue(m.result || m.win || m.victory || '')}</td>
          <td>${m.timestamp || m.date || m.fecha ? new Date(m.timestamp || m.date || m.fecha).toLocaleString() : ''}</td>
        </tr>
      `).join('') : `<tr><td colspan="3">Sin partidas del jugador.</td></tr>`;
    }

    function renderGroupMatches(data) {
      const rows = getAllMatchesFromGroup(data);
      const target = document.getElementById('groupChart');
      if (!target) return;
      const labels = rows.map(x => x.jugador);
      const values = rows.map(x => getEloReal(currentData.find(p => p.jugador === x.jugador) || {}));
      if (groupChart) groupChart.destroy();
      groupChart = new Chart(target, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Elo Real', data: values, backgroundColor: '#d13639', borderRadius: 10 }] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `Elo Real: ${ctx.raw}`
              }
            }
          },
          scales: {
            x: { ticks: { color: '#8a97a6' }, grid: { color: 'rgba(255,255,255,.06)' } },
            y: { ticks: { color: '#e7edf4' }, grid: { display: false } }
          }
        }
      });
    }

    function renderChart(data) {
      const ctx = document.getElementById('historyChart');
      if (!ctx) return;
      if (historyChart) historyChart.destroy();
      const selected = selectedPlayer || data[0];
      if (!selected) return;
      const matches = getPlayerMatches(selected);
      const labels = matches.map((_, i) => `Partida ${i + 1}`).reverse();
      const values = matches.map(m => getEloReal(selected)).reverse();
      historyChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Elo Real',
            data: values,
            borderColor: '#d13639',
            backgroundColor: 'rgba(209,54,57,.18)',
            tension: .35,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => `Elo Real: ${ctx.raw}`
              }
            },
            legend: { labels: { color: '#e7edf4' } }
          },
          scales: {
            x: { ticks: { color: '#8a97a6' }, grid: { color: 'rgba(255,255,255,.06)' } },
            y: { ticks: { color: '#8a97a6' }, grid: { color: 'rgba(255,255,255,.06)' } }
          }
        }
      });
    }

    function cleanValue(v) { return (v === null || v === undefined) ? '' : String(v); }

    function getRankClass(rango) {
      const r = String(rango || '').toUpperCase();
      if (r.includes('EMERALD')) return 'emerald';
      if (r.includes('GOLD')) return 'gold';
      if (r.includes('DIAMOND')) return 'diamond';
      if (r.includes('MASTER')) return 'master';
      return '';
    }

    function setCardBackground(card, row) {
      const champ = row?.champMaestriaNombre || row?.ultimoCampeon || '';
      const splash = champ ? `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champ}_0.jpg` : '';
      if (splash) card.style.backgroundImage = `linear-gradient(180deg, rgba(17,24,32,.78) 0%, rgba(22,32,43,.92) 100%), url('${splash}')`;
    }

    function getTipsByRow(row) {
      const winRate = parseFloat(String(getRealWinrate(row)).replace('%','')) || 0;
      const lp = parseNum(row.lp);
      const rank = String(row.rango || '').toUpperCase();
      if (rank.includes('MASTER') || rank.includes('DIAMOND')) return 'Consejo: tu fuerte está en la consistencia. Si mantienes winrate y pool de campeones, puedes dominar el draft.';
      if (winRate >= 60) return 'Consejo: estás con buen ritmo. Prioriza campeones en los que ya tengas impacto temprano y no fuerces picks raros.';
      if (lp >= 100) return 'Consejo: el LP indica que estás cerca de una transición de división. Juega seguro y evita trades innecesarios.';
      return 'Consejo: revisa tendencia de victorias, campeón más jugado y el rango. Con eso puedes afinar decisiones para el equipo.';
    }

    function openModal(row) {
      selectedPlayer = row;
      const modal = document.getElementById('modal');
      const title = document.getElementById('modalTitle');
      const subtitle = document.getElementById('modalSubtitle');
      const details = document.getElementById('modalDetails');
      const banner = document.getElementById('modalBanner');
      const champCard = document.getElementById('modalChampCard');
      const modalTips = document.getElementById('modalTips');
      const links = buildExternalLinks(row);
      const champ = row.champMaestriaNombre || row.ultimoCampeon || '';
      const splash = champ ? `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champ}_0.jpg` : '';
      const champIcon = champ ? `https://ddragon.leagueoflegends.com/cdn/14.10.1/img/champion/${champ}.png` : '';

      title.textContent = row.jugador || '';
      subtitle.textContent = row.rango || '';

      banner.style.background = splash
        ? `linear-gradient(90deg, rgba(11,15,20,.88) 0%, rgba(11,15,20,.52) 45%, rgba(11,15,20,.12) 100%), url('${splash}') center/cover no-repeat`
        : `linear-gradient(90deg, rgba(11,15,20,.88) 0%, rgba(11,15,20,.52) 45%, rgba(11,15,20,.12) 100%)`;

      champCard.style.display = champ ? 'flex' : 'none';
      champCard.innerHTML = champ ? `${champIcon ? `<img src="${champIcon}" alt="${champ}">` : ''}<div><div class="champ-name">${cleanValue(champ)}</div><div class="champ-sub">Campeón con más maestría</div></div>` : '';

      details.innerHTML = `
        <div class="modal-item"><div class="label">Rango</div><div class="value ${getRankClass(row.rango)}">${cleanValue(row.rango)}</div></div>
        <div class="modal-item"><div class="label">LP</div><div class="value info">${cleanValue(row.lp)}</div></div>
        <div class="modal-item"><div class="label">Victorias</div><div class="value">${cleanValue(row.wins ?? row.victorias)}</div></div>
        <div class="modal-item"><div class="label">Derrotas</div><div class="value">${cleanValue(row.losses ?? row.derrotas)}</div></div>
        <div class="modal-item"><div class="label">Winrate</div><div class="value warn">${getRealWinrate(row)}</div></div>
        <div class="modal-item"><div class="label">Nivel</div><div class="value">${cleanValue(row.nivel)}</div></div>
        <div class="modal-item"><div class="label">Último Campeón</div><div class="value">${cleanValue(row.ultimoCampeon)}</div></div>
        <div class="modal-item"><div class="label">Pentas</div><div class="value">${cleanValue(row.pentas)}</div></div>
        <div class="modal-item"><div class="label">Visión</div><div class="value good">${cleanValue(row.vision)}</div></div>
        <div class="modal-item"><div class="label">KDA</div><div class="value">${cleanValue(row.kda)}</div></div>
        <div class="modal-item"><div class="label">KP%</div><div class="value warn">${cleanValue(row.kp)}</div></div>
        <div class="modal-item"><div class="label">DPM</div><div class="value purple">${cleanValue(row.dpm)}</div></div>
        <div class="modal-item"><div class="label">Elo Real</div><div class="value info">${getEloReal(row)}</div></div>
      `;

      document.getElementById('linkOpgg').href = links.opgg;
      document.getElementById('linkDpm').href = links.dpm;
      document.getElementById('linkGol').href = links.lg;
      document.getElementById('linkUgg').href = links.ugg;

      modalTips.textContent = getTipsByRow(row);
      renderPlayerMatches(row);
      renderChart(currentData);
      modal.classList.add('open');
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal').classList.remove('open');
    }

    function getLinkOpgg(row){
      return `https://op.gg/lol/summoners/lan/${encodeURIComponent(row.jugador || '')}-${encodeURIComponent(row.tag || '')}`;
    }

    function renderCards(data, message = '') {
      const cards = document.getElementById('cards');
      const status = document.getElementById('status');

      if (!data.length) {
        cards.innerHTML = '<div class="empty">No se encontraron datos.</div>';
        status.textContent = message;
        renderChart([]);
        renderGroupMatches([]);
        return;
      }

      cards.innerHTML = data.map((row, idx) => {
        const rankClass = getRankClass(row.rango);
        const opgg = getLinkOpgg(row);
        return `
          <article class="card" onclick="openModal(currentData[${idx}])">
            <div class="profile-wrap">
              <div class="level-badge">${cleanValue(row.nivel) || '0'}</div>
              <img class="profile-icon" src="https://ddragon.leagueoflegends.com/cdn/14.8.1/img/profileicon/${cleanValue(row.profileIconId)}.png" alt="Perfil">
            </div>
            <div class="card-head">
              <div class="name ${rankClass} center-text">
                <a href="${opgg}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;">
                  ${cleanValue(row.jugador)}
                </a>
              </div>
            </div>
            <div class="rank ${rankClass}"><span>${cleanValue(row.rango)}</span></div>
          </article>
        `;
      }).join('');

      [...cards.querySelectorAll('.card')].forEach((card, idx) => setCardBackground(card, data[idx]));
      status.textContent = message;
      renderChart(data);
      renderGroupMatches(data);
    }

    function saveCards(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function loadSavedCards() { const saved = localStorage.getItem(STORAGE_KEY); return saved ? JSON.parse(saved) : []; }

    async function loadData() {
      const status = document.getElementById('status');
      try {
        status.textContent = 'Cargando...';
        const data = await window.fetchData();
        currentData = data;
        saveCards(data);
        renderCards(data, `Actualizado: ${new Date().toLocaleString()}`);
      } catch (err) {
        const saved = loadSavedCards();
        currentData = saved;
        if (saved.length) renderCards(saved, 'Mostrando datos guardados.');
        else renderCards([], `Error: ${err.message}`);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadSavedCards();
      currentData = saved;
      if (saved.length) renderCards(saved, 'Mostrando datos guardados.');
      else { renderChart([]); renderGroupMatches([]); }
    });
  </script>
</body>
</html>
