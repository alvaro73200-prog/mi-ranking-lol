<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Grey - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b0e;
            --card-bg: #16171d;
            --accent: #00cfbc;
            --gold: #f0e6d2;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 24px; margin-bottom: 30px; }

        /* Contenedores de Rejilla */
        .grid-container {
            display: grid;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .top-grid { grid-template-columns: repeat(2, 1fr); }
        .bottom-grid { grid-template-columns: repeat(3, 1fr); }

        /* Tarjeta Estilo Botón */
        .card {
            background: var(--card-bg);
            border: 1px solid #2a2c35;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0, 207, 188, 0.1);
        }

        .p-icon { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        .p-name { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .p-rank { font-size: 12px; text-transform: uppercase; color: #aaa; margin-bottom: 15px; }
        
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #25262d; padding-top: 15px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { font-weight: bold; font-size: 14px; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }

        /* Contenedor de la Gráfica */
        .chart-container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid #2a2c35;
            border-radius: 12px;
            margin: 30px 0;
            padding: 20px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .top-grid, .bottom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Team Grey Leaderboard</h1>

    <div id="top-cards" class="grid-container top-grid"></div>

    <div class="chart-container">
        <canvas id="winrateChart"></canvas>
    </div>

    <div id="bottom-cards" class="grid-container bottom-grid"></div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFxPfnhgOkIHzHMJ3S2TERvDc0OCiWzSUrbLJEOTKSaCWxmE8UUgb9NXXzUxr6gWRZjA/exec";
        let myChart;

        function getPlayerColor(name) {
            const colors = {
                'Grey#W8TM': '#ffb347',
                'Azzz#Bou': '#b19cd9',
                'Raven#Aisha': '#ffb7ce',
                'Bodkin Arrow#bhr': '#77dd77',
                'Zenix#4025': '#c3aed6',
                'ForjaEterna#ETRN': '#aec6cf'
            };
            return colors[name.trim()] || '#ffffff';
        }

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL + "?cb=" + Date.now());
                const data = await res.json();
                
                renderCards(data);
                renderChart(data);
            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function renderCards(players) {
            const topDiv = document.getElementById('top-cards');
            const bottomDiv = document.getElementById('bottom-cards');
            topDiv.innerHTML = "";
            bottomDiv.innerHTML = "";

            players.forEach((p, i) => {
                const nameParts = p.jugador.split('#');
                const opggUrl = `https://www.op.gg/summoners/lan/${encodeURIComponent(nameParts[0])}-${encodeURIComponent(nameParts[1] || '')}`;
                const color = getPlayerColor(p.jugador);
                
                const cardHtml = `
                    <a href="${opggUrl}" target="_blank" class="card">
                        <img class="p-icon" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/profileicon/${p.icono}.png">
                        <div class="p-name" style="color: ${color}">${p.jugador}</div>
                        <div class="p-rank">${p.rango} - ${p.lp}</div>
                        <div style="font-size: 20px;">${p.racha}</div>
                        <div class="stats-row">
                            <div class="stat-item"><span class="stat-val">${p.winrate}</span><span class="stat-label">WinRate</span></div>
                            <div class="stat-item"><span class="stat-val">${p.kda}</span><span class="stat-label">KDA</span></div>
                            <div class="stat-item"><span class="stat-val">${p.wins}W</span><span class="stat-label">Wins</span></div>
                        </div>
                    </a>
                `;

                if (i < 2) topDiv.innerHTML += cardHtml;
                else bottomDiv.innerHTML += cardHtml;
            });
        }

        function renderChart(players) {
            const ctx = document.getElementById('winrateChart').getContext('2d');
            const labels = players.map(p => p.jugador.split('#')[0]);
            const winrates = players.map(p => parseFloat(p.winrate));
            const colors = players.map(p => getPlayerColor(p.jugador));

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '% Win Rate del Equipo',
                        data: winrates,
                        backgroundColor: colors.map(c => c + 'AA'), // Color con transparencia
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#25262d' }, ticks: { color: '#666' } },
                        x: { grid: { display: false }, ticks: { color: '#fff' } }
                    }
                }
            });
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
