<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard LAN - Team Grey</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #060608;
            --card: #121217;
            --accent: #00cfbc;
            --gold: #f0e6d2;
            --master: #ff79c6;
            --diamante: #3498db;
            --esmeralda: #2ecc71;
            --oro: #f1c40f;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
        }

        h1 { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 22px; }

        .leaderboard-card {
            background: var(--card);
            border: 1px solid #25262d;
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            overflow-x: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        
        th { 
            text-align: left; 
            color: #a0a0a8; 
            font-size: 13px; 
            text-transform: uppercase; 
            padding: 20px 15px; 
            border-bottom: 1px solid #25262d; 
        }
        
        td { padding: 18px 15px; border-bottom: 1px solid #1e1f24; font-size: 14px; }

        .player-link {
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .player-link:hover { opacity: 0.8; }

        .rank-tag {
            padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        .rank-master { color: var(--master); border-color: var(--master); }
        .rank-diamante { color: var(--diamante); border-color: var(--diamante); }
        .rank-esmeralda { color: var(--esmeralda); border-color: var(--esmeralda); }
        .rank-oro { color: var(--oro); border-color: var(--oro); }

        .lp-text { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 16px; }
        
        .win-text { color: #2ecc71; font-weight: bold; }
        .loss-text { color: #ff4e50; font-weight: bold; }
        .winrate { font-size: 12px; font-weight: bold; }

        .kda-box { font-weight: bold; color: #eee; }
        .live-status { font-size: 12px; font-weight: bold; color: #2ecc71; }
        .offline-status { color: #444; font-weight: bold; }

        .fire-streak { filter: drop-shadow(0 0 5px orange); }
    </style>
</head>
<body>

    <h1>TOP ELO</h1>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invocador</th>
                    <th>Rango / LP</th>
                    <th>W/L (WR%)</th>
                    <th>KDA (10 Last)</th> 
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr><td colspan="6" style="text-align:center; padding:50px; color:#555;">Sincronizando con la API de Riot...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const sorted = results.data.sort((a,b) => parseInt(b.LP || 0) - parseInt(a.LP || 0));
                    render(sorted);
                }
            });
        }

        function getPlayerColor(name) {
            const colors = {
                'Grey#W8TM': '#ffb347',        // Naranja Pastel
                'Azzz#Bou': '#b19cd9',         // Morado Pastel
                'Raven#Aisha': '#ffb7ce',      // Rosado Pastel
                'Bodkin Arrow#bhr': '#77dd77', // Verde Pastel
                'Zenix#4025': '#c3aed6',       // Lila Pastel
                'ForjaEterna#ETRN': '#aec6cf'  // Azul Pastel
            };
            return colors[name] || '#ffffff';
        }

        function getWinrateColor(wrPercent) {
            if (wrPercent >= 50) return `rgb(46, 204, 113)`; 
            return `rgb(231, 76, 60)`;
        }

        function render(players) {
            const container = document.getElementById('table-content');
            let html = '';

            players.forEach((p, i) => {
                const r = (p.Rango || "").toLowerCase();
                let rClass = r.includes('master') ? 'rank-master' : 
                             r.includes('diamante') ? 'rank-diamante' : 
                             r.includes('esmeralda') ? 'rank-esmeralda' : 
                             r.includes('oro') ? 'rank-oro' : '';
                
                const isOnline = p["Campeón"] && p["Campeón"].includes("Online");
                const hasFire = p["Racha"] && p["Racha"].includes("🔥");

                const nameParts = p.Jugador.split('#');
                const opggUrl = `https://www.op.gg/summoners/lan/${encodeURIComponent(nameParts[0].trim())}-${encodeURIComponent(nameParts[1] ? nameParts[1].trim() : '')}`;
                
                const customColor = getPlayerColor(p.Jugador.trim());

                const wlRaw = p["V/D"] || '0W / 0D';
                const wlParts = wlRaw.split('/');
                const winText = `<span class="win-text">${wlParts[0] || '0W'}</span>`;
                const lossText = `<span class="loss-text">${wlParts[1] || '0D'}</span>`;
                
                const wrRaw = p["WR%"] || '0%';
                const wrValue = parseFloat(wrRaw.replace('%', '')) || 0;
                const wrColor = getWinrateColor(wrValue);

                html += `
                    <tr>
                        <td style="color:#444; font-weight:bold;">${i + 1}</td>
                        <td>
                            <a href="${opggUrl}" target="_blank" class="player-link" style="color:${customColor}">
                                <div style="font-weight:bold; font-size:15px; text-shadow: 0 0 8px ${customColor}44;">
                                    ${p.Jugador} ${hasFire ? '<span class="fire-streak">🔥</span>' : ''}
                                </div>
                            </a>
                        </td>
                        <td>
                            <span class="rank-tag ${rClass}">${p.Rango || 'SIN RANGO'}</span>
                            <div class="lp-text">${p.LP || 0} LP</div>
                        </td>
                        <td>
                            <div style="color:#ccc">${winText} / ${lossText}</div>
                            <div class="winrate" style="color:${wrColor}">${wrRaw} Winrate</div>
                        </td>
                        <td class="kda-box">${p["KDA Avg"] || '0.00'}</td>
                        <td>
                            ${isOnline ? '<span class="live-status">Online</span>' : '<span class="offline-status">Offline</span>'}
                            <div style="font-size:10px; color:#666">${p["Estado Live"] || ''}</div>
                        </td>
                    </tr>
                `;
            });
            container.innerHTML = html;
        }
        window.onload = loadData;
    </script>
</body>
</html>
