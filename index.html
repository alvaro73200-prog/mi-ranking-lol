<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> Team </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #09090c; --card: #121217; --accent: #00cfbc; --gold: #f0e6d2; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .leaderboard-card { background: var(--card); border: 1px solid #25262d; border-radius: 4px; width: 100%; max-width: 800px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #a0a0a8; font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid #25262d; }
        td { padding: 15px; border-bottom: 1px solid #1e1f24; }
        .rank-tag { background: #1e1f24; color: #c8aa6e; padding: 4px 8px; border-radius: 2px; font-size: 11px; border: 1px solid #3c3c41; }
        .lp-text { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Leaderboard LAN</h1>

    <div class="leaderboard-card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Invocador</th>
                    <th>Rango</th>
                    <th>LP</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr><td colspan="4" style="text-align:center; padding:50px;">Buscando jugadores en la Grieta...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1QLLy1Re4K4bW5HfCmOBqvVYBai_abDwZtkE9lH5hdIFCnR3I1GsK-fp5xt_rg8jBs9V5ckPhu2-s/pub?output=csv';

        function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: false, // Cambiado a false para leer por posición, no por nombre
                complete: function(results) {
                    const rows = results.data;
                    // Quitamos la primera fila (los encabezados)
                    const players = rows.slice(1).filter(r => r[0]); 
                    
                    // Ordenar por la columna C (LP) de mayor a menor
                    players.sort((a, b) => parseInt(b[2] || 0) - parseInt(a[2] || 0));

                    let html = '';
                    players.forEach((p, i) => {
                        html += `
                            <tr>
                                <td style="color:#555">${i + 1}</td>
                                <td style="font-weight:bold">${p[0]}</td>
                                <td><span class="rank-tag">${p[1] || 'UNRANKED'}</span></td>
                                <td class="lp-text">${p[2] || 0} LP</td>
                            </tr>
                        `;
                    });
                    document.getElementById('table-content').innerHTML = html || '<tr><td colspan="4">No hay datos.</td></tr>';
                }
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
