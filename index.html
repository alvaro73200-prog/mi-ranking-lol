<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#eee;padding:24px}
    button{padding:10px 14px;border:0;border-radius:8px;background:#d33;color:#fff;cursor:pointer}
    pre{margin-top:16px;background:#1b1b1b;padding:16px;border-radius:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>LOL Tracker LAN</h1>
  <button onclick="loadData()">Cargar datos</button>
  <pre id="output">Presiona el botón...</pre>

  <script src="./data.js"></script>
  <script>
    async function loadData() {
      const output = document.getElementById('output');
      try {
        const data = await window.fetchData();
        if (!data.length) {
          output.textContent = 'No se encontraron datos.';
          return;
        }
        output.textContent = data.map(row =>
          `${row.jugador}#${row.tag} | ${row.rango} | ${row.lp} | ${row.wr} | ${row.vd}`
        ).join('\n');
      } catch (err) {
        output.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
