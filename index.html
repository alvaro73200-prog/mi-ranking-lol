<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOL Tracker - LAN</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="header-title">
      <h1>LOL TRACKER</h1>
      <div class="hextech-glow">LAN</div>
    </div>

    <div class="swiper mySwiper">
      <div class="swiper-wrapper" id="player-cards-container"></div>
      <div class="swiper-pagination"></div>
    </div>

    <div class="players-list-section">
      <h3 class="section-title">Jugadores</h3>
      <div id="players-list"></div>
    </div>

    <div id="dashboard-content">
      <div class="welcome-msg">Selecciona un jugador para ver detalles</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script src="api.js"></script>
  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
