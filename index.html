<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOL Tracker LAN</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111820;
      --panel2:#16202b;
      --text:#e7edf4;
      --muted:#8a97a6;
      --accent:#d13639;
      --line:#243140;
      --shadow:0 12px 30px rgba(0,0,0,.35);
      --good:#4ade80;
      --info:#60a5fa;
      --warn:#f59e0b;
      --purple:#a855f7;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:linear-gradient(180deg,#091017 0%, #0b0f14 100%);
      color:var(--text);
      font-family:"Segoe UI", Inter, Arial, sans-serif;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
      letter-spacing:.5px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(209,54,57,.25);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
      min-height:260px;
      display:flex;
      flex-direction:column;
      gap:14px;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: fadeUp .35s ease both;
    }

    .card:hover{
      transform: translateY(-6px);
      border-color: rgba(209,54,57,.55);
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }

    .card-head{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .rank-icon{
      width:54px;
      height:54px;
      min-width:54px;
      min-height:54px;
      object-fit:contain;
      display:block;
      transition: transform .25s ease;
    }

    .card:hover .rank-icon{
      transform: scale(1.08) rotate(-2deg);
    }

    .name{
      font-size:20px;
      font-weight:800;
      line-height:1.1;
    }

    .tag{
      color:var(--muted);
      margin-top:4px;
      font-size:13px;
    }

    .rank{
      font-size:15px;
      font-weight:700;
      color:#f0f4f8;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .champion{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.35;
    }

    .pentas{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(168,85,247,.14);
      border:1px solid rgba(168,85,247,.35);
      color:#f3e8ff;
      font-size:12px;
      font-weight:800;
      width:fit-content;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(115px, 1fr));
      gap:10px;
      margin-top:auto;
    }

    .stat{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
      border-radius:12px;
      padding:10px;
      min-height:70px;
    }

    .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .value{
      font-size:18px;
      font-weight:800;
      line-height:1.15;
      word-break:break-word;
    }

    .value.good{ color:var(--good); }
    .value.info{ color:var(--info); }
    .value.warn{ color:var(--warn); }
    .value.purple{ color:var(--purple); }

    .footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
    }

    .status{
      margin-top:12px;
      color:var(--muted);
    }

    .empty{
      grid-column:1/-1;
      padding:20px;
      border:1px dashed var(--line);
      border-radius:16px;
      color:var(--muted);
      background:rgba(255,255,255,.02);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform: translateY(12px);
      }
      to{
        opacity:1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px){
      body{ padding:16px; }
      .cards{ grid-template-columns:1fr; }
      .card{ padding:14px; }
      .stats{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .rank-icon{ width:50px; height:50px; min-width:50px; min-height:50px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LOL Tracker LAN</h1>
    <div class="sub">Vista por tarjetas para tu equipo, estilo oscuro tipo Riot.</div>

    <div class="topbar">
      <button onclick="loadData()">Cargar datos</button>
    </div>

    <div id="cards" class="cards">
      <div class="empty">Presiona “Cargar datos” para ver los jugadores.</div>
    </div>

    <div id="status" class="status"></div>
    <div class="footer">Datos cargados desde Google Sheets con tu CSV público.</div>
  </div>

  <script src="./data.js"></script>
  <script>
    const STORAGE_KEY = 'lol-tracker-cards';

    function getRankIcon(rango) {
      const r = String(rango || '').toLowerCase();
      if (r.includes('iron')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-iron.png';
      if (r.includes('bronze')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-bronze.png';
      if (r.includes('silver')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-silver.png';
      if (r.includes('gold')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-gold.png';
      if (r.includes('platinum')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-platinum.png';
      if (r.includes('emerald')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-emerald.png';
      if (r.includes('diamond')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-diamond.png';
      if (r.includes('master')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-master.png';
      if (r.includes('grandmaster')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-grandmaster.png';
      if (r.includes('challenger')) return 'https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-challenger.png';
      return '';
    }

    function renderCards(data, message = '') {
      const cards = document.getElementById('cards');
      const status = document.getElementById('status');

      if (!data.length) {
        cards.innerHTML = '<div class="empty">No se encontraron datos.</div>';
        status.textContent = message;
        return;
      }

      cards.innerHTML = data.map(row => {
        const icon = getRankIcon(row.rango);
        const pentas = Number(row.pentas || 0);
        const hasPentas = pentas > 0;

        return `
          <article class="card">
            <div class="card-head">
              ${icon ? `<img class="rank-icon" src="${icon}" alt="${row.rango || 'Rango'}">` : ''}
              <div>
                <div class="name">${row.jugador || ''}</div>
                <div class="tag">${row.tag ? '#' + row.tag : ''}</div>
              </div>
            </div>

            <div class="rank">
              <span>${row.rango || ''}</span>
              <span style="color:var(--muted);font-weight:600;">${row.nivel ? `Nv. ${row.nivel}` : ''}</span>
            </div>

            <div class="champion">
              Último Campeón: <strong style="color:var(--text)">${row.ultimoCampeon || row.lastChampion || 'Sin datos'}</strong>
            </div>

            ${hasPentas ? `<div class="pentas">✨ ${pentas} Pentas</div>` : ''}

            <div class="stats">
              <div class="stat">
                <div class="label">LP</div>
                <div class="value info">${row.lp || ''}</div>
              </div>
              <div class="stat">
                <div class="label">WR</div>
                <div class="value">${row.wr || row.winRate || ''}</div>
              </div>
              <div class="stat">
                <div class="label">Visión</div>
                <div class="value good">${row.vision || ''}</div>
              </div>
              <div class="stat">
                <div class="label">KDA</div>
                <div class="value">${row.kda || ''}</div>
              </div>
              <div class="stat">
                <div class="label">KP%</div>
                <div class="value warn">${row.kp || ''}</div>
              </div>
              <div class="stat">
                <div class="label">DPM</div>
                <div class="value purple">${row.dpm || ''}</div>
              </div>
            </div>
          </article>
        `;
      }).join('');

      status.textContent = message;
    }

    function saveCards(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadSavedCards() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    async function loadData() {
      const status = document.getElementById('status');
      try {
        status.textContent = 'Cargando...';
        const data = await window.fetchData();
        saveCards(data);
        renderCards(data, `Actualizado: ${new Date().toLocaleString()}`);
      } catch (err) {
        const saved = loadSavedCards();
        if (saved.length) {
          renderCards(saved, 'Mostrando datos guardados.');
        } else {
          renderCards([], `Error: ${err.message}`);
        }
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const saved = loadSavedCards();
      if (saved.length) {
        renderCards(saved, 'Mostrando datos guardados.');
      }
    });
  </script>
</body>
</html>
