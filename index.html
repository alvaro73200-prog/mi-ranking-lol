<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOL Tracker</title>
  <base target="_top">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <?!= include('styles'); ?>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1><i class="fa-solid fa-shield-halved"></i> LOL Tracker</h1>
        <p>Dashboard competitivo para League of Legends LAN.</p>
      </div>

      <div class="actions">
        <div class="status-pill">
          <span class="dot"></span>
          <span>Última actualización: <strong id="lastUpdate">—</strong></span>
        </div>
        <button class="btn" id="refreshBtn">
          <i class="fa-solid fa-rotate-right"></i> Refresh
        </button>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2><i class="fa-solid fa-users"></i> Jugadores</h2>
          <span>Tabla principal</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Jugador</th>
                <th>LP</th>
                <th>Rango</th>
                <th>Campeón</th>
                <th>Estado Live</th>
                <th>WR%</th>
                <th>V/D</th>
              </tr>
            </thead>
            <tbody id="playersTable">
              <tr><td colspan="7" class="empty">Cargando datos...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2><i class="fa-solid fa-chart-column"></i> LP</h2>
          <span>Gráfico de barras</span>
        </div>
        <div class="chart-box">
          <div class="chart-inner">
            <canvas id="lpChart"></canvas>
          </div>
        </div>
      </section>
    </main>

    <section class="bottom-grid">
      <section class="panel">
        <div class="panel-head">
          <h2><i class="fa-solid fa-id-card"></i> Tarjetas</h2>
          <span>Resumen rápido</span>
        </div>
        <div class="cards" id="cardsArea">
          <div class="empty">Esperando datos...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2><i class="fa-solid fa-clock-rotate-left"></i> Historial</h2>
          <span>Actividad reciente</span>
        </div>
        <div class="history" id="historyArea">
          <div class="empty">Sin eventos aún.</div>
        </div>
      </section>
    </section>
  </div>

  <?!= include('app.js'); ?>
</body>
</html>
