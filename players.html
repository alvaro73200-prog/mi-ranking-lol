<script>
/**
 * players.html — Carga inicial de datos desde Google Sheets
 *
 * Se ejecuta al cargar la página. Obtiene la lista de jugadores
 * del backend (code.gs) y luego inicia toda la interfaz.
 */
let playersList = [];

google.script.run
  .withSuccessHandler(datos => {
    playersList = datos || [];
    iniciarTodo();
  })
  .withFailureHandler(error => {
    console.error('Error al cargar jugadores:', error);
    const dashboard = document.getElementById('dashboard-content');
    if (dashboard) {
      dashboard.innerHTML = '<p style="color: var(--red);">Error al cargar datos. Recarga la página.</p>';
    }
  })
  .obtenerDatosJugadores();
</script>
