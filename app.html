<script>
/**
 * app.html — Lógica principal de la aplicación
 *
 * Maneja la interacción del usuario: expansión de tarjetas,
 * renderizado del dashboard y configuración del carrusel Swiper.
 */

/* ─── Estado global ─── */
let swiperInstance   = null;
let expandedCard     = null;
let clickHandlerBound = false;

/* ═══════════════════════════════════════
   Utilidades
   ═══════════════════════════════════════ */

/** Normaliza texto para comparaciones seguras. */
function normalizeText(value) {
  return String(value ?? '').trim().toLowerCase();
}

/** Busca un jugador por nombre (case-insensitive). */
function findPlayerByTarget(targetName) {
  const target = normalizeText(targetName);
  return playersList.find(p => normalizeText(p.Nombre) === target);
}

/* ═══════════════════════════════════════
   Dashboard
   ═══════════════════════════════════════ */

/**
 * Genera una barra de progreso inline.
 * @param {string} label  — Etiqueta de la barra.
 * @param {number} value  — Valor numérico actual.
 * @param {string} color  — Color hex para la barra.
 * @returns {string} — HTML de la barra de progreso.
 */
function createProgressRow(label, value, color) {
  const num      = Number(value) || 0;
  const maxValue = 1000;
  const pct      = Math.min((num / maxValue) * 100, 100);

  return `
    <div>
      <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px; color:#d6d6d6;">
        <span>${label}</span>
        <span>${num}</span>
      </div>
      <div style="width:100%; height:12px; background:#1a1f27; border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,0.06);">
        <div style="width:${pct}%; height:100%; background:${color}; box-shadow:0 0 12px ${color}55; transition:width 0.6s ease;"></div>
      </div>
    </div>
  `;
}

/**
 * Renderiza el panel de estadísticas para el jugador seleccionado.
 * @param {Object|null} player     — Datos del jugador (o null si no encontrado).
 * @param {string}      targetName — Nombre buscado.
 */
function renderDashboard(player, targetName) {
  const dashboard = document.getElementById('dashboard-content');
  if (!dashboard) return;

  if (!player) {
    dashboard.innerHTML = `
      <div style="padding:24px; color:var(--hextech-gold);">
        <h2>${targetName}</h2>
        <p>Sin datos en el Excel.</p>
      </div>
    `;
    return;
  }

  const color = player.Color_Hex || '#c8aa6e';
  const wr    = parseInt(player.PorcentajeVictorias) || 0;

  dashboard.innerHTML = `
    <div style="
      background: linear-gradient(180deg, #05070a 0%, #0b0f14 100%);
      border: 1px solid ${color};
      border-left: 5px solid ${color};
      border-radius: 18px;
      padding: 20px;
      color: #e8e8e8;
      box-shadow: 0 0 24px rgba(0,0,0,0.35);
    ">
      <!-- Encabezado del jugador -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
        <div>
          <h2 style="margin:0; font-size:22px; color:${color};">
            ${player.Nombre}#${player.Tag}
          </h2>
          <p style="margin:6px 0 0; color:#a7b0bc; font-size:13px;">
            Campeón Favorito: ${player.CampeonFavorito || 'Buscando...'}
          </p>
        </div>
        <div style="
          padding:8px 12px;
          border-radius:999px;
          background:rgba(255,255,255,0.04);
          border:1px solid rgba(255,255,255,0.08);
        ">
          ${player.Rango} (${player.LP} LP)
        </div>
      </div>

      <!-- Victorias y Derrotas -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
        <div style="background:#0d1218; border-radius:14px; padding:14px;">
          <div style="color:#9ca3af; font-size:12px;">Victorias</div>
          <div style="font-size:20px; font-weight:700; color:var(--green);">${player.Victorias}</div>
        </div>
        <div style="background:#0d1218; border-radius:14px; padding:14px;">
          <div style="color:#9ca3af; font-size:12px;">Derrotas</div>
          <div style="font-size:20px; font-weight:700; color:var(--red);">${player.Derrotas}</div>
        </div>
      </div>

      <!-- Barra de progreso -->
      ${createProgressRow('Porcentaje de Victorias', wr, color)}
    </div>
  `;
}

/* ═══════════════════════════════════════
   Interacción con tarjetas
   ═══════════════════════════════════════ */

/** Expande una tarjeta y colapsa la anterior si existe. */
function expandCard(card) {
  closeExpandedCard(false);
  card.classList.add('is-expanded');
  expandedCard = card;

  setTimeout(() => {
    if (swiperInstance?.update) swiperInstance.update();
  }, 50);
}

/** Colapsa la tarjeta expandida actual. */
function closeExpandedCard(restartAutoplay = true) {
  if (expandedCard) {
    expandedCard.classList.remove('is-expanded');
    expandedCard = null;
  }

  setTimeout(() => {
    if (swiperInstance?.update) swiperInstance.update();
  }, 50);

  if (restartAutoplay && swiperInstance?.autoplay) {
    swiperInstance.autoplay.start();
  }
}

/** Manejador global de clics en tarjetas y filas de jugador. */
function handleDocumentClick(e) {
  const clickedCard = e.target.closest('.player-card, .player-row');

  // Clic fuera de cualquier tarjeta → cerrar
  if (!clickedCard) {
    closeExpandedCard();
    return;
  }

  const targetName  = clickedCard.dataset.player || '';
  const playerFound = findPlayerByTarget(targetName);

  // Toggle: si ya está expandida, cerrar; si no, abrir
  if (expandedCard === clickedCard) {
    closeExpandedCard();
  } else {
    expandCard(clickedCard);
  }

  // Pausar autoplay mientras el usuario interactúa
  if (swiperInstance?.autoplay) {
    swiperInstance.autoplay.stop();
  }

  renderDashboard(playerFound, targetName);
}

/** Registra el listener de clics una sola vez. */
function bindClickListenerOnce() {
  if (clickHandlerBound) return;
  document.addEventListener('click', handleDocumentClick);
  clickHandlerBound = true;
}

/* ═══════════════════════════════════════
   Lista de jugadores
   ═══════════════════════════════════════ */

/** Renderiza la grilla de jugadores debajo del carrusel. */
function renderPlayersList() {
  const container = document.getElementById('players-list');
  if (!container) return;

  container.innerHTML = '';

  playersList.forEach(player => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.dataset.player = player.Nombre;

    row.innerHTML = `
      <div class="player-row-name">${player.Nombre || '-'}</div>
      <div class="player-row-rank">${player.Rango || '-'}</div>
    `;

    container.appendChild(row);
  });
}

/* ═══════════════════════════════════════
   Inicialización
   ═══════════════════════════════════════ */

/** Punto de entrada: renderiza todo e inicializa Swiper. */
function iniciarTodo() {
  renderPlayerCards();
  renderPlayersList();
  bindClickListenerOnce();

  if (typeof Swiper === 'undefined') return;

  // Destruir instancia anterior si existe
  if (swiperInstance?.destroy) {
    swiperInstance.destroy(true, true);
  }

  swiperInstance = new Swiper('.mySwiper', {
    slidesPerView: 'auto',
    spaceBetween: 20,
    centeredSlides: true,
    watchSlidesProgress: true,
    speed: 600,
    loop: false,
    rewind: true,
    autoplay: {
      delay: 2500,
      disableOnInteraction: false,
      pauseOnMouseEnter: true,
    },
    pagination: {
      el: '.swiper-pagination',
      clickable: true,
    },
    breakpoints: {
      768:  { spaceBetween: 25 },
      1024: { spaceBetween: 30 },
    },
  });
}
</script>
